<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPESHA EXAMBRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --danger: #e74c3c; --success: #27ae60; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f0f2f5; overflow: hidden; user-select: none; }
        
        /* HEADER DIPERBESAR */
        .header { 
            background: var(--primary); color: white; padding: 12px 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            font-size: 16px; position: fixed; top: 0; width: 100%; z-index: 100; 
            box-sizing: border-box; box-shadow: 0 3px 10px rgba(0,0,0,0.3);
        }
        .header-left { font-weight: bold; font-size: 18px; }
        .header-right { display: flex; align-items: center; gap: 15px; }

        .page { display: none; height: 100vh; width: 100vw; padding: 20px; box-sizing: border-box; padding-top: 70px; }
        .active { display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #pageLogin { padding-top: 0; } /* Login tidak butuh padding top header */

        .login-card { background: white; padding: 35px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 380px; text-align: center; }
        .logo-login { width: 100px; margin-bottom: 20px; }
        
        .input-group { position: relative; margin-bottom: 15px; width: 100%; }
        .input-group i { position: absolute; left: 15px; top: 12px; color: #95a5a6; }
        .input-group input, .input-group select { width: 100%; padding: 12px 15px 12px 45px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        
        button.btn-primary { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        
        /* Tombol Keluar Khusus di Login */
        .btn-exit-login { margin-top: 20px; background: none; border: none; color: var(--danger); cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <!-- Header muncul selalu kecuali saat login (dikontrol via JS) -->
    <div id="headerApp" class="header" style="display:none;">
        <div class="header-left">SPESHA EXAMBRO</div>
        <div class="header-right">
            <div style="text-align: right;">
                <b id="txtSiswa" style="display:block;">Siswa</b>
                <small id="txtKelas">Kelas</small>
            </div>
            <i class="fa-solid fa-circle-xmark" onclick="mintaPinKeluar()" style="color:#ff7675; font-size: 24px; cursor:pointer;"></i>
        </div>
    </div>

    <!-- PAGE LOGIN -->
    <div id="pageLogin" class="page active">
        <div class="login-card">
            <img src="https://smpshalahuddin.sch.id/wp-content/uploads/2025/12/cropped-LOGO-SPESHA-1.png" class="logo-login">
            <h3 style="margin-top:0; color:var(--primary);">LOGIN PESERTA</h3>
            <div class="input-group"><i class="fa-solid fa-user"></i><input type="text" id="username" placeholder="Username"></div>
            <div class="input-group"><i class="fa-solid fa-lock"></i><input type="password" id="password" placeholder="Password"></div>
            <button class="btn-primary" onclick="doLogin()">MASUK</button>
            <button class="btn-exit-login" onclick="mintaPinKeluar()"><i class="fa-solid fa-power-off"></i> KELUAR APLIKASI</button>
        </div>
    </div>

    <!-- PAGE MAPEL -->
    <div id="pageMapel" class="page">
        <div class="login-card">
            <i class="fa-solid fa-book-open" style="font-size: 50px; color: var(--accent); margin-bottom: 15px;"></i>
            <h3>PILIH MATA PELAJARAN</h3>
            <div class="input-group">
                <i class="fa-solid fa-list-check"></i>
                <select id="selectMapel"><option value="">Memuat Mapel...</option></select>
            </div>
            <button class="btn-primary" onclick="keToken()">LANJUTKAN</button>
        </div>
    </div>

    <!-- PAGE TOKEN -->
    <div id="pageToken" class="page">
        <div class="login-card">
            <h3 id="judulMapel">UJIAN</h3>
            <div class="input-group"><i class="fa-solid fa-key"></i><input type="text" id="tokenUjian" placeholder="Masukkan Token"></div>
            <div style="display:flex; gap:10px;">
                <button onclick="pindahKe('pageMapel')" style="flex:1; background:#95a5a6; border:none; color:white; border-radius:8px;">BATAL</button>
                <button onclick="prosesMulai()" style="flex:1; background:var(--success); border:none; color:white; border-radius:8px; padding:12px;">KONFIRMASI</button>
            </div>
        </div>
    </div>

    <!-- PAGE UJIAN -->
    <div id="pageUjian" class="page" style="padding:0; padding-top:55px;">
        <iframe id="frameUjian" src="" style="width:100%; height:100%; border:none;"></iframe>
    </div>

    <script>
        const URL_GAS = "URL_WEB_APP_BAPAK"; 
        let userSiswa = {}; let listMapel = []; let mapelAktif = {};

        function pindahKe(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            // Header muncul di semua halaman kecuali login[cite: 4]
            document.getElementById('headerApp').style.display = (id === 'pageLogin') ? 'none' : 'flex';
        }

        async function doLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if(!u || !p) return alert("Username/Password kosong!");
            
            try {
                const res = await fetch(`${URL_GAS}?action=login&user=${u}&pass=${p}`);
                const d = await res.json();
                if (d.status === "success") {
                    userSiswa = d;
                    document.getElementById('txtSiswa').innerText = d.nama;
                    document.getElementById('txtKelas').innerText = d.kelas;
                    muatMapel();
                    pindahKe('pageMapel');
                } else alert("Login Gagal!");
            } catch(e) { alert("Server tidak merespon."); }
        }

        async function muatMapel() {
            const res = await fetch(`${URL_GAS}?action=getMapel`);
            listMapel = await res.json();
            const sel = document.getElementById('selectMapel');
            sel.innerHTML = '<option value="">-- Pilih Mapel --</option>';
            listMapel.forEach(m => sel.innerHTML += `<option value="${m.nama}">${m.nama}</option>`);
        }

        function keToken() {
            const val = document.getElementById('selectMapel').value;
            mapelAktif = listMapel.find(m => m.nama === val);
            if(mapelAktif) {
                document.getElementById('judulMapel').innerText = mapelAktif.nama;
                pindahKe('pageToken');
            } else alert("Pilih Mapel!");
        }

        async function prosesMulai() {
            const tk = document.getElementById('tokenUjian').value;
            if (tk === mapelAktif.token) {
                // Jalankan Presensi Otomatis sebelum buka soal[cite: 4]
                fetch(`${URL_GAS}?action=presensi&nama=${encodeURIComponent(userSiswa.nama)}&kelas=${encodeURIComponent(userSiswa.kelas)}&mapel=${encodeURIComponent(mapelAktif.nama)}`);
                
                document.getElementById('frameUjian').src = mapelAktif.link;
                pindahKe('pageUjian');
            } else alert("Token Salah!");
        }

        function mintaPinKeluar() {
            const pin = prompt("Masukkan PIN Petugas:");
            if(pin) {
                fetch(`${URL_GAS}?action=checkExitPin&pin=${pin}`)
                .then(r => r.json())
                .then(d => {
                    if(d.status === "valid") {
                        if(window.AndroidControl) window.AndroidControl.keluarUjian();
                        else alert("Aplikasi ditutup (Mode Browser)");
                    } else alert("PIN Salah!");
                });
            }
        }
    </script>
</body>
</html>
