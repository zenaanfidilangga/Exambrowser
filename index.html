<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHA EXAMBRO</title>
    <link rel="icon" type="image/png" href="https://smpshalahuddin.sch.id/wp-content/uploads/2025/12/cropped-LOGO-SPESHA-1.png">
    <style>
        :root { --primary: #1a252f; --danger: #c0392b; --success: #27ae60; --warning: #f39c12; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f4f7f6; overflow: hidden; user-select: none; }
        
        /* HEADER STATIS */
        .header { background: var(--primary); color: white; padding: 0 15px; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; width: 100%; z-index: 1000; height: 60px; box-sizing: border-box; }
        .header-info { font-size: 11px; flex-grow: 1; margin: 0 15px; line-height: 1.2; }
        .btn-keluar-teks { background: transparent; border: 1px solid #fff; color: white; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 12px; }

        .page { display: none; height: 100vh; width: 100vw; padding-top: 60px; box-sizing: border-box; }
        .active { display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 85%; max-width: 360px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn-block { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        
        /* OVERLAY PELANGGARAN PROFESIONAL */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 2000; color: white; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 30px; }
        .heavy-violation { background: linear-gradient(135deg, #000 0%, #c0392b 100%); }
    </style>
</head>
<body onblur="detectCheat()">

    <div class="header">
        <b style="font-size: 14px; color: #3498db;">SPESHA</b>
        <div class="header-info" id="hInfo">Selamat Datang</div>
        <div id="hP" style="color: var(--warning); font-weight: bold; margin-right: 10px;">P: 0</div>
        <button class="btn-keluar-teks" onclick="handleExit()">KELUAR</button>
    </div>

    <div id="pLogin" class="page active">
        <div class="card">
            <img src="https://smpshalahuddin.sch.id/wp-content/uploads/2025/12/cropped-LOGO-SPESHA-1.png" width="70">
            <h3>LOGIN SISWA</h3>
            <input type="text" id="u" placeholder="Username">
            <input type="password" id="p" placeholder="Password">
            <button class="btn-block" style="background:var(--primary); color:white;" onclick="login()">MASUK</button>
        </div>
    </div>

    <div id="pMapel" class="page">
        <div class="card">
            <h3>PILIH MAPEL</h3>
            <select id="sMapel" style="width:100%; padding:12px; margin-bottom:15px;"></select>
            <button class="btn-block" style="background:var(--primary); color:white;" onclick="toToken()">LANJUT</button>
        </div>
    </div>

    <div id="pToken" class="page">
        <div class="card">
            <h3 id="tTitle">UJIAN</h3>
            <input type="text" id="tk" placeholder="Masukkan Token">
            <div style="display:flex; gap:10px;">
                <button class="btn-block" style="background:#95a5a6; color:white;" onclick="pindah('pMapel')">BATAL</button>
                <button class="btn-block" style="background:var(--success); color:white;" onclick="startExam()">KONFIRMASI</button>
            </div>
        </div>
    </div>

    <div id="pExam" class="page" style="padding:0; padding-top:60px;">
        <iframe id="fExam" src="" style="width:100%; height:100%; border:none;"></iframe>
    </div>

    <!-- LOCK SCREEN -->
    <div id="lOverlay" class="overlay">
        <h1 id="lTitle">TERKUNCI</h1>
        <p id="lDesc">Pelanggaran Terdeteksi</p>
        <input type="text" id="lInput" placeholder="KODE AKSES" style="width:200px; text-align:center; background: #fff; color: #000;">
        <button class="btn-block" id="lBtn" style="width:200px; background:var(--success); color:white; margin-top:10px;">BUKA</button>
    </div>

    <script>
        const API = "URL_WEB_APP_BAPAK"; 
        let user = {}, mapel = {}, pCount = 0, isExam = false;

        // 9. LAYAR SELALU MENYALA
        if ('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(()=>{});

        function pindah(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function login() {
            const res = await fetch(`${API}?action=login&user=${document.getElementById('u').value}&pass=${document.getElementById('p').value}`);
            const d = await res.json();
            if(d.status === "success") {
                user = d;
                document.getElementById('hInfo').innerHTML = `${d.nama}<br>${d.kelas}`;
                loadMapel(); pindah('pMapel');
            } else alert("❌ Username/Password Salah!");
        }

        async function loadMapel() {
            const res = await fetch(`${API}?action=getMapel`);
            const list = await res.json();
            const s = document.getElementById('sMapel');
            s.innerHTML = '<option value="">-- Pilih Ujian --</option>';
            list.forEach(m => s.innerHTML += `<option value='${JSON.stringify(m)}'>${m.nama}</option>`);
        }

        function toToken() {
            const val = document.getElementById('sMapel').value;
            if(!val) return;
            mapel = JSON.parse(val);
            document.getElementById('tTitle').innerText = mapel.nama;
            pindah('pToken');
        }

        async function startExam() {
            if(document.getElementById('tk').value === mapel.token) {
                // 4. PRESENSI OTOMATIS
                fetch(`${API}?action=presensi&nama=${encodeURIComponent(user.nama)}&kelas=${encodeURIComponent(user.kelas)}&mapel=${encodeURIComponent(mapel.nama)}`);
                document.getElementById('fExam').src = mapel.link;
                isExam = true; pindah('pExam');
            } else alert("❌ Token Salah!");
        }

        // 5. & 6. DETEKSI PELANGGARAN
        function detectCheat() {
            if(!isExam) return;
            pCount++;
            document.getElementById('hP').innerText = "P: " + pCount;
            if(pCount >= 2) {
                showLock("proctor", "APLIKASI TERKUNCI", "Pelanggaran 2x. Hubungi Proktor.");
            }
        }

        function handleExit() {
            showLock("exit", "KONFIRMASI KELUAR", "Masukkan PIN Keluar (F2)");
        }

        // F1 UNTUK PROKTOR & KEPSEK, F2 UNTUK KELUAR
        function showLock(type, title, desc) {
            const ov = document.getElementById('lOverlay');
            ov.style.display = 'flex';
            if(type === 'principal') ov.classList.add('heavy-violation');
            
            document.getElementById('lTitle').innerText = title;
            document.getElementById('lDesc').innerText = desc;
            
            document.getElementById('lBtn').onclick = async () => {
                const code = document.getElementById('lInput').value;
                const res = await fetch(`${API}?action=checkCode&type=${type}&code=${code}`);
                const d = await res.json();
                
                if(d.status === 'valid') {
                    if(title === "KONFIRMASI KELUAR") {
                        if(window.AndroidControl) window.AndroidControl.keluarUjian();
                        else location.reload();
                    }
                    ov.style.display = 'none';
                    ov.classList.remove('heavy-violation');
                    document.getElementById('lInput').value = "";
                    pCount = 0; document.getElementById('hP').innerText = "P: 0";
                } else alert("❌ Kode Salah!");
            };
        }

        // DETEKSI TOMBOL RECENT/BACK (HEAVY VIOLATION)
        window.addEventListener('popstate', () => {
            if(isExam) showLock("principal", "PELANGGARAN BERAT", "Hubungi Kepala Sekolah (Kode F1)");
        });
        history.pushState(null, null, location.href);
    </script>
</body>
</html>
