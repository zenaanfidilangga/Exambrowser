<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPESHA EXAMBRO CBT</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --blue: #0056b3; --yellow: #ffc107; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); overflow: hidden; user-select: none; }
        header { background: #fff; padding: 10px 25px; display: flex; justify-content: space-between; border-bottom: 4px solid var(--blue); align-items: center; height: 60px; box-sizing: border-box; }
        #main-layout { display: grid; grid-template-columns: 1fr 300px; height: calc(100vh - 60px); }
        .question-area { background: #fff; padding: 30px; overflow-y: auto; position: relative; border-right: 1px solid #ddd; }
        .sidebar { background: #f8f9fa; padding: 15px; display: flex; flex-direction: column; overflow-y: auto; }
        .q-text { font-size: 1.25rem; margin-bottom: 25px; color: #333; line-height: 1.6; }
        .opt { display: flex; align-items: center; padding: 15px; border: 1px solid #ddd; margin: 10px 0; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .opt:hover { background: #f0f7ff; }
        .opt.selected { background: var(--blue); color: white; border-color: var(--blue); }
        .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 10px; }
        .nav-n { height: 45px; border: 1px solid #ccc; background: #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .nav-n.active { border: 3px solid var(--blue); color: var(--blue); }
        .nav-n.done { background: var(--blue); color: white; border-color: var(--blue); }
        .nav-n.ragu { background: var(--yellow); color: #000; border-color: var(--yellow); }
        .footer { position: absolute; bottom: 0; left: 0; width: 100%; background: #fff; border-top: 1px solid #ddd; padding: 15px 30px; display: flex; justify-content: space-between; box-sizing: border-box; }
        .btn { padding: 12px 25px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #lock-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; color: white; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <i class="fas fa-shield-alt" style="font-size: 80px; color: #dc3545; margin-bottom: 20px;"></i>
        <h2>SISTEM TERKUNCI</h2>
        <p>Hubungi Proktor untuk membuka akses (PIN F1).</p>
        <input type="password" id="pin-f1" placeholder="PIN F1" style="padding: 12px; text-align: center; border-radius: 5px; border: none; font-size: 1.1rem;">
        <button onclick="unlock()" style="margin-top: 20px; padding: 10px 40px; background: #28a745; color: white; border: none; border-radius: 5px; font-weight: bold;">BUKA</button>
    </div>

    <header>
        <div style="font-weight: 800; color: var(--blue); font-size: 1.2rem;">SPESHA EXAMBRO</div>
        <div id="user-info" style="text-align: right; font-size: 0.9rem;"></div>
    </header>

    <div id="login-screen" style="display: flex; justify-content: center; align-items: center; height: 80vh;">
        <div style="background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 320px; text-align: center;">
            <h3 style="color: var(--blue);">LOGIN PESERTA</h3>
            <input type="text" id="u" placeholder="Username" style="width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px;">
            <input type="password" id="p" placeholder="Password" style="width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 5px;">
            <button onclick="login()" style="width: 100%; padding: 12px; background: var(--blue); color: white; border: none; border-radius: 5px; font-weight: bold;">MASUK APLIKASI</button>
        </div>
    </div>

    <div id="exam-screen" style="display: none;">
        <div id="main-layout">
            <div class="question-area">
                <div id="q-content">
                    <div id="q-title" class="q-text"></div>
                    <div id="q-opts"></div>
                </div>
                <div class="footer">
                    <button class="btn" style="background: #6c757d; color: white;" onclick="move(-1)">KEMBALI</button>
                    <button class="btn" style="background: var(--yellow);" onclick="setRagu()">RAGU-RAGU</button>
                    <button class="btn" style="background: var(--blue); color: white;" onclick="move(1)">BERIKUTNYA</button>
                </div>
            </div>
            <div class="sidebar">
                <h4 style="margin: 0 0 10px 0;">Navigasi Nomor</h4>
                <div id="nav-grid" class="nav-grid"></div>
                <button onclick="finish()" style="margin-top: auto; padding: 15px; background: #dc3545; color: white; border: none; border-radius: 8px; font-weight: bold;">SELESAI (F2)</button>
            </div>
        </div>
    </div>

    <script>
        // MASUKKAN URL APPS SCRIPT ANDA DI BAWAH INI
        const WEB_URL = "https://script.google.com/macros/s/AKfycby8xogJ7pYxKc5_osuwn3YVJSnSUCCBI5iVo4A_vxErCZBGtHi1nwROZFGyDDCbyjiI3Q/exec"; 
        
        let questions = [], cur = 0, answers = {}, ragu = {}, student = {}, f1 = "", f2 = "", mapelNow = "";
        let viol = 0;

        window.onblur = () => {
            if (questions.length > 0 && localStorage.getItem("locked") !== "true") {
                viol++;
                if (viol >= 2) { localStorage.setItem("locked", "true"); location.reload(); }
                else Swal.fire('PERINGATAN', 'Jangan keluar dari aplikasi!', 'warning');
            }
        };

        if (localStorage.getItem("locked") === "true") document.getElementById('lock-screen').style.display = 'flex';

        async function login() {
            const user = document.getElementById('u').value, pass = document.getElementById('p').value;
            Swal.fire({title: 'Autentikasi...', didOpen: () => Swal.showLoading()});
            try {
                const r = await fetch(`${WEB_URL}?action=login&user=${user}&pass=${pass}`);
                const d = await r.json();
                if (d.status === "success") {
                    student = d; f1 = d.f1; f2 = d.f2;
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('user-info').innerHTML = `<b>${d.nama}</b><br>Ruang: ${d.ruang}`;
                    Swal.close(); loadMapel();
                } else Swal.fire('Gagal', 'User/Password Salah', 'error');
            } catch (e) {
                Swal.fire('Error', 'Gagal terhubung ke database. Cek Deployment URL Apps Script Anda.', 'error');
            }
        }

        async function loadMapel() {
            const r = await fetch(`${WEB_URL}?action=getMapel`);
            const m = await r.json();
            let h = m.map(x => `<button onclick="checkToken('${x.link}','${x.token}','${x.nama}')" style="display:block; width:100%; margin:10px 0; padding:15px; border:1px solid var(--blue); background:white; border-radius:8px; font-weight:bold; cursor:pointer;">${x.nama}</button>`).join('');
            Swal.fire({ title: 'Pilih Mata Pelajaran', html: h, showConfirmButton: false });
        }

        function checkToken(link, token, nama) {
            Swal.fire({ title: 'Masukkan Token', input: 'text' }).then(res => {
                if (res.value === String(token)) { mapelNow = nama; start(link); }
                else if(res.isConfirmed) Swal.fire('Token Salah', '', 'error');
            });
        }

        async function start(url) {
            Swal.fire({title: 'Menyiapkan Soal...', didOpen: () => Swal.showLoading()});
            const r = await fetch(`${WEB_URL}?action=getQuestions&url=${encodeURIComponent(url)}`);
            questions = await r.json();
            Swal.close();
            document.getElementById('exam-screen').style.display = 'block';
            document.documentElement.requestFullscreen();
            render();
        }

        function render() {
            const q = questions[cur];
            document.getElementById('q-title').innerHTML = `<b>Soal No. ${cur+1}</b> ${q.type === "CHECKBOX" ? "<br><small style='color:red;'>(Jawaban boleh lebih dari satu)</small>" : ""}<br><br>${q.title}`;
            document.getElementById('q-opts').innerHTML = q.options.map((o, i) => {
                let isSelected = (q.type === "CHECKBOX") ? (answers[cur] || []).includes(o) : (answers[cur] === o);
                let icon = (q.type === "CHECKBOX") ? (isSelected ? 'fa-check-square' : 'fa-square') : (isSelected ? 'fa-dot-circle' : 'fa-circle');
                return `<div class="opt ${isSelected ? 'selected' : ''}" onclick="ans('${o}')"><i class="far ${icon}" style="margin-right:15px;"></i><b>${String.fromCharCode(65+i)}. </b> ${o}</div>`;
            }).join('');
            const g = document.getElementById('nav-grid');
            g.innerHTML = questions.map((_, i) => {
                let c = (i === cur) ? 'active' : '';
                if (answers[i] && (Array.isArray(answers[i]) ? answers[i].length > 0 : answers[i])) c += ' done';
                if (ragu[i]) c += ' ragu';
                return `<div class="nav-n ${c}" onclick="cur=${i};render()">${i+1}</div>`;
            }).join('');
        }

        function ans(v) {
            const q = questions[cur];
            if (q.type === "CHECKBOX") {
                if (!answers[cur]) answers[cur] = [];
                let idx = answers[cur].indexOf(v);
                if (idx > -1) answers[cur].splice(idx, 1); else answers[cur].push(v);
            } else { answers[cur] = v; }
            render();
        }

        function move(d) { let n = cur + d; if (n >= 0 && n < questions.length) { cur = n; render(); } }
        function setRagu() { ragu[cur] = !ragu[cur]; render(); }

        async function finish() {
            Swal.fire({ title: 'Selesaikan Ujian?', text: "Masukkan PIN F2 untuk mengakhiri", input: 'password' }).then(async res => {
                if (res.value === String(f2)) {
                    Swal.fire({title: 'Mengirim Nilai...', didOpen: () => Swal.showLoading()});
                    let b = 0;
                    questions.forEach((q, i) => {
                        if (q.type === "CHECKBOX") {
                            if (JSON.stringify((answers[i] || []).sort()) === JSON.stringify(q.correct.sort())) b++;
                        } else { if (answers[i] === q.correct[0]) b++; }
                    });
                    const skor = (b / questions.length) * 100;
                    await fetch(`${WEB_URL}?action=submitSkor&nama=${student.nama}&ruang=${student.ruang}&mapel=${mapelNow}&skor=${skor}`);
                    location.reload();
                } else if(res.isConfirmed) Swal.fire('PIN Salah', '', 'error');
            });
        }

        function unlock() {
            if (document.getElementById('pin-f1').value === String(f1)) {
                localStorage.removeItem("locked"); location.reload();
            } else Swal.fire('PIN Salah', '', 'error');
        }
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
