<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spesha Exambro</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* RESET & DASAR */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { background-color: #F0F2F5; overscroll-behavior: none; user-select: none; /* Cegah Block Text */ }
        
        /* HEADER PERSISTEN */
        .header { background-color: #1A73E8; height: 70px; display: flex; align-items: center; padding: 0 15px; color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); position: fixed; width: 100%; top: 0; z-index: 1000; }
        .logo { width: 45px; height: 45px; background-color: white; border-radius: 50%; margin-right: 15px; } /* Ganti logo asli pakai <img> nanti */
        .identitas { flex: 1; }
        .identitas h1 { font-size: 14px; margin-bottom: 3px; }
        .identitas p { font-size: 12px; color: #E0E0E0; }
        .pelanggaran { font-weight: bold; color: #FFEB3B; margin-right: 15px; font-size: 14px; }
        .btn-keluar { background-color: #D32F2F; color: white; border: none; padding: 8px 12px; border-radius: 4px; font-size: 12px; font-weight: bold; cursor: pointer; }

        /* KONTINER UTAMA */
        .main-container { margin-top: 70px; height: calc(100vh - 70px); position: relative; }

        /* VIEW LOGIN */
        .login-view { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .card h2 { color: #1A73E8; margin-bottom: 10px; }
        .card p { color: #757575; font-size: 12px; margin-bottom: 25px; }
        .input-group { margin-bottom: 15px; }
        .input-group input { width: 100%; padding: 15px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; }
        .btn-login { width: 100%; background-color: #1A73E8; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; margin-top: 10px;}
        
        /* WEBVIEW EXAM (IFRAME) */
        .exam-view { display: none; width: 100%; height: 100%; border: none; }

        /* RED BLOCK VIEW */
        .red-block { display: none; position: fixed; top: 70px; left: 0; width: 100%; height: calc(100vh - 70px); background-color: #D32F2F; color: white; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; text-align: center; padding: 20px; }
        .red-block h2 { font-size: 24px; margin-bottom: 15px; }
        .red-block p { font-size: 16px; margin-bottom: 30px; line-height: 1.5; }
        .btn-buka { background-color: white; color: #D32F2F; border: none; padding: 15px 25px; font-weight: bold; border-radius: 8px; font-size: 16px; cursor: pointer; }

        /* MODAL / OVERLAY LOADING */
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); z-index: 3000; justify-content: center; align-items: center; color: white; }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="logo"></div>
        <div class="identitas">
            <h1>Spesha Exambro</h1>
            <p id="txtIdentitas">Belum Login</p>
        </div>
        <div class="pelanggaran" id="txtPelanggaran">P: 0</div>
        <button class="btn-keluar" onclick="mintaPin('exit')">KELUAR</button>
    </header>

    <div class="main-container">
        <!-- LOGIN VIEW -->
        <div class="login-view" id="loginView">
            <div class="card">
                <h2>Login Siswa</h2>
                <p>Masukkan akun untuk memulai ujian</p>
                <div class="input-group"><input type="text" id="user" placeholder="Username / NISN" autocomplete="off"></div>
                <div class="input-group"><input type="password" id="pass" placeholder="Password"></div>
                <button class="btn-login" onclick="login()">MASUK KE UJIAN</button>
            </div>
            <p style="margin-top:20px; font-size:10px; color:#9E9E9E;">© 2026 SMP Shalahuddin - SHA EXAMBRO</p>
        </div>

        <!-- EXAM VIEW (IFRAME) -->
        <iframe class="exam-view" id="examView" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
    </div>

    <!-- RED BLOCK VIEW -->
    <div class="red-block" id="redBlockView">
        <h2 id="tvJudulBlokir">PELANGGARAN TERDETEKSI!</h2>
        <p id="tvPesanBlokir">Anda keluar dari layar ujian atau melakukan kecurangan.<br>Wajib melapor ke Proktor.</p>
        <button class="btn-buka" onclick="mintaPin('proktor')">Buka Blokir (Proktor)</button>
    </div>

    <!-- LOADING OVERLAY -->
    <div class="overlay" id="loadingOverlay">Memproses...</div>

    <script>
        // MASUKKAN URL DEPLOY GAS BAPAK DI SINI
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbysTEfDcrztLGdSo6QYd59wOIp23ePaZQZJ2OVnTJEk6S70kLmzP9Vcv0V_oRmoQsDERA/exec";
        
        let currentName = "", currentClass = "", violations = 0;
        let isExamStarted = false, isLocked = false;

        // CEK MEMORI LOKAL SAAT APLIKASI DIBUKA (Menggantikan SharedPreferences)
        window.onload = () => {
            currentName = localStorage.getItem("exambro_name") || "";
            if (currentName) {
                currentClass = localStorage.getItem("exambro_class") || "-";
                violations = parseInt(localStorage.getItem("exambro_vCount_" + currentName) || 0);
                isLocked = localStorage.getItem("exambro_locked_" + currentName) === "true";
                
                document.getElementById('txtIdentitas').innerText = currentName + " | " + currentClass;
                document.getElementById('txtPelanggaran').innerText = "P: " + violations;

                if (isLocked || violations >= 2) {
                    kunciLayar();
                } else {
                    // Jika belum terkunci tapi sudah ada nama, minta login ulang demi keamanan
                    logoutLokal();
                }
            }
        };

        // FUNGSI KOMUNIKASI DENGAN GAS
        async function kirimDataGAS(payload) {
            document.getElementById('loadingOverlay').style.display = 'flex';
            try {
                let response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                let result = await response.json();
                document.getElementById('loadingOverlay').style.display = 'none';
                return result;
            } catch (error) {
                document.getElementById('loadingOverlay').style.display = 'none';
                alert("Gagal terhubung ke server. Pastikan internet lancar.");
                return null;
            }
        }

        // LOGIKA LOGIN
        async function login() {
            let u = document.getElementById('user').value.trim();
            let p = document.getElementById('pass').value.trim();
            if (!u || !p) return alert("Isi username dan password!");

            let res = await kirimDataGAS({ action: "login", user: u, pass: p });
            if (res && res.status === "success") {
                currentName = res.name;
                currentClass = res.kelas;
                
                // Cek riwayat pelanggaran di memori lokal HP ini
                let savedVCount = parseInt(localStorage.getItem("exambro_vCount_" + currentName) || 0);
                let wasLocked = localStorage.getItem("exambro_locked_" + currentName) === "true";
                violations = Math.max(res.vCount, savedVCount);

                // Simpan ke sesi lokal
                localStorage.setItem("exambro_name", currentName);
                localStorage.setItem("exambro_class", currentClass);
                
                document.getElementById('txtIdentitas').innerText = currentName + " | " + currentClass;
                document.getElementById('txtPelanggaran').innerText = "P: " + violations;

                if (wasLocked || violations >= 2) {
                    kunciLayar();
                } else {
                    masukModeLayarPenuh();
                    loadMapel();
                }
            } else if (res) {
                alert(res.msg || "User/Password Salah!");
            }
        }

        // AMBIL MAPEL
        async function loadMapel() {
            let res = await kirimDataGAS({ action: "getMapel" });
            if (res && res.status === "success" && res.data.length > 0) {
                // Sederhananya di web, kita pakai prompt default
                let mapelText = "Pilih Mapel (Ketik angkanya):\n";
                res.data.forEach((m, index) => { mapelText += `${index+1}. ${m.mapel}\n`; });
                
                let pilihan = prompt(mapelText);
                let index = parseInt(pilihan) - 1;
                
                if(!isNaN(index) && res.data[index]) {
                    cekToken(res.data[index]);
                } else {
                    alert("Pilihan tidak valid."); loadMapel();
                }
            }
        }

        // CEK TOKEN & PRESENSI
        function cekToken(mapelObj) {
            let tokenInput = prompt(`Masukkan Token untuk ${mapelObj.mapel}:`);
            if (tokenInput === mapelObj.token) {
                document.getElementById('loginView').style.display = 'none';
                document.getElementById('examView').style.display = 'block';
                document.getElementById('examView').src = mapelObj.link;
                isExamStarted = true;
                
                // Kirim Presensi
                kirimDataGAS({ action: "presensi", name: currentName, kelas: currentClass, mapel: mapelObj.mapel });
            } else if (tokenInput !== null) {
                alert("Token Salah!"); loadMapel();
            }
        }

        // ANTI CHEAT: DETEKSI PINDAH TAB / KELUAR APLIKASI
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && isExamStarted && !isLocked) {
                catatPelanggaran();
            }
        });

        // ANTI CHEAT: CEGAH KLIK KANAN / COPAS
        document.addEventListener('contextmenu', e => { e.preventDefault(); alert("Dilarang klik kanan!"); });
        document.addEventListener('copy', e => { e.preventDefault(); catatPelanggaran(); alert("Dilarang menyalin (Copas)!"); });

        // PROSES PELANGGARAN
        function catatPelanggaran() {
            violations++;
            document.getElementById('txtPelanggaran').innerText = "P: " + violations;
            localStorage.setItem("exambro_vCount_" + currentName, violations);

            if (violations >= 2) kunciLayar();

            kirimDataGAS({ action: "updateViolation", name: currentName, count: violations, heavy: (violations >= 2) });
        }

        // KUNCI LAYAR
        function kunciLayar() {
            isLocked = true;
            localStorage.setItem("exambro_locked_" + currentName, "true");
            
            document.getElementById('redBlockView').style.display = 'flex';
            document.getElementById('examView').style.display = 'none';
            document.getElementById('loginView').style.display = 'none';
            keluarModeLayarPenuh();
        }

        // BUKA BLOKIR / KELUAR
        async function mintaPin(type) {
            let inputPin = prompt("Masukkan PIN:");
            if (!inputPin) return;

            let res = await kirimDataGAS({ action: "verifyPin", type: type, pin: inputPin });
            if (res && res.status === "success") {
                if (type === 'exit') {
                    logoutLokal();
                    window.close(); // Tidak selalu berhasil di browser, tapi kita reset tampilannya
                } else {
                    // BUKA BLOKIR PROKTOR
                    isLocked = false;
                    violations = 0;
                    localStorage.setItem("exambro_locked_" + currentName, "false");
                    localStorage.setItem("exambro_vCount_" + currentName, "0");
                    logoutLokal();
                    alert("Blokir dibuka. Silakan login kembali dari awal.");
                }
            } else {
                alert("PIN Salah!");
            }
        }

        function logoutLokal() {
            currentName = ""; currentClass = ""; isExamStarted = false;
            document.getElementById('txtIdentitas').innerText = "Belum Login";
            document.getElementById('txtPelanggaran').innerText = "P: 0";
            document.getElementById('user').value = ""; document.getElementById('pass').value = "";
            document.getElementById('redBlockView').style.display = 'none';
            document.getElementById('examView').style.display = 'none';
            document.getElementById('examView').src = "about:blank";
            document.getElementById('loginView').style.display = 'flex';
            keluarModeLayarPenuh();
        }

        // FULLSCREEN API (Opsional untuk web)
        function masukModeLayarPenuh() {
            let elem = document.documentElement;
            if (elem.requestFullscreen) { elem.requestFullscreen().catch(e => {}); }
        }
        function keluarModeLayarPenuh() {
            if (document.exitFullscreen) { document.exitFullscreen().catch(e => {}); }
        }
    </script>
</body>
</html>
