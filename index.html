<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPESHA EXAMBRO - SMP SHALAHUDDIN</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --blue: #0056b3; --yellow: #ffc107; --bg: #f4f7f9; --red: #dc3545; }
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; outline: none; }
        input, textarea { -webkit-user-select: text; user-select: text; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: var(--bg); overflow: hidden; }

        /* Badge Pelanggaran Atas Tengah */
        #viol-badge { 
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%); 
            z-index: 9999; background: var(--red); color: white; 
            padding: 8px 25px; border-radius: 30px; font-weight: bold; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); display: none; 
        }

        header { background: #fff; padding: 10px 25px; display: flex; justify-content: space-between; border-bottom: 4px solid var(--blue); align-items: center; height: 70px; box-sizing: border-box; }
        #exam-container { width: 100%; height: calc(100vh - 70px); border: none; }
        
        #lock-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; color: white; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .logo-img { height: 50px; margin-right: 15px; }
        
        .btn-mapel { display:block; width:100%; margin:10px 0; padding:15px; border:2px solid var(--blue); background:white; border-radius:8px; font-weight:bold; cursor:pointer; }
    </style>
</head>
<body oncontextmenu="return false" onkeydown="return disableKeys(event)">

    <!-- Counter Pelanggaran -->
    <div id="viol-badge">PELANGGARAN: 0</div>

    <!-- Screen Lock (KODE OPERATOR) -->
    <div id="lock-screen">
        <i class="fas fa-user-lock" style="font-size: 80px; color: var(--red); margin-bottom: 20px;"></i>
        <h2>APLIKASI TERKUNCI</h2>
        <p>Anda terdeteksi keluar dari ujian.<br>Hubungi Proktor untuk membuka.</p>
        <input type="password" id="pin-input" placeholder="Masukkan KODE OPERATOR" style="padding: 12px; text-align: center; border-radius: 5px; border: none; font-size: 1.1rem; width: 200px;">
        <button onclick="verifyPin('checkPin')" style="margin-top: 20px; padding: 10px 40px; background: #28a745; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">BUKA</button>
    </div>

    <header>
        <div style="display: flex; align-items: center;">
            <img class="logo-img" src="https://smpshalahuddin.sch.id/wp-content/uploads/2025/12/cropped-LOGO-SPESHA-1.png" id="app-logo">
            <div style="font-weight: 800; color: var(--blue); font-size: 1.2rem;">SPESHA EXAMBRO</div>
        </div>
        <div id="user-info" style="text-align: right; font-size: 0.9rem;"></div>
    </header>

<div id="login-screen" style="display: flex; justify-content: center; align-items: center; height: 80vh;">
    <div style="background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 25px rgba(0,0,0,0.1); width: 320px; text-align: center;">
        <!-- Logo di Halaman Login -->
        <img src="https://smpshalahuddin.sch.id/wp-content/uploads/2025/12/cropped-LOGO-SPESHA-1.png" style="height: 80px; margin-bottom: 20px;"> 
        
        <h3 style="color: var(--blue); margin-top: 0;">LOGIN PESERTA</h3>
        <input type="text" id="u" placeholder="Username" style="width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box;">
        <input type="password" id="p" placeholder="Password" style="width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box;">
        <button onclick="login()" style="width: 100%; padding: 12px; background: var(--blue); color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">MASUK</button>
    </div>
</div>

    <!-- Area Google Form -->
    <div id="exam-screen" style="display: none;">
        <iframe id="exam-container" src=""></iframe>
        <button onclick="verifyPin('checkExitPin')" style="position: fixed; bottom: 20px; right: 20px; padding: 10px 20px; background: var(--red); color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; z-index: 100;">SELESAI</button>
    </div>

    <script>
        const WEB_URL = "https://script.google.com/macros/s/AKfycbxr36rJKPOCusxmZl60Z7RI2HKuChDwd3XSzItyeZ4Koenp2_nN4mNlEr0oNkePn8Sewg/exec"; 
        let student = {}, mapelNow = "", viol = 0, isExamActive = false;

        function disableKeys(e) {
            if (e.ctrlKey && (e.key === 'c' || e.key === 'v' || e.key === 'u' || e.key === 's')) return false;
            if (e.key === 'F12' || e.key === 'F5') return false;
            return true;
        }

        /// Tambahkan variabel untuk mengecek apakah sedang fokus di iframe
let isFocusOnIframe = false;

window.addEventListener('blur', () => {
    // Jika fokus hilang tapi isExamActive aktif dan bukan karena klik di dalam soal
    setTimeout(() => {
        if (isExamActive && localStorage.getItem("locked") !== "true") {
            // Cek apakah yang aktif sekarang adalah iframe soal
            if (document.activeElement !== document.getElementById('exam-container')) {
                viol++;
                document.getElementById('viol-badge').style.display = 'block';
                document.getElementById('viol-badge').innerHTML = `PELANGGARAN: ${viol}`;
                
                if (viol >= 3) {
                    localStorage.setItem("locked", "true");
                    location.reload();
                } else {
                    Swal.fire('PERINGATAN', `Jangan keluar dari layar ujian! (${viol}/3)`, 'warning');
                }
            }
        }
    }, 100); // Beri jeda sedikit agar sistem bisa menentukan elemen mana yang aktif
});

        if (localStorage.getItem("locked") === "true") document.getElementById('lock-screen').style.display = 'flex';

        async function login() {
            const user = document.getElementById('u').value, pass = document.getElementById('p').value;
            Swal.fire({title: 'Autentikasi...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
            try {
                const r = await fetch(`${WEB_URL}?action=login&user=${user}&pass=${pass}`);
                const d = await r.json();
                if (d.status === "success") {
                    student = d;
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('user-info').innerHTML = `<b>${d.nama}</b><br>${d.ruang}`;
                    Swal.close(); 
                    loadMapel();
                } else {
                    Swal.fire('Gagal', 'Akun salah', 'error');
                }
            } catch(e) { Swal.fire('Error', 'Koneksi gagal', 'error'); }
        }

        async function loadMapel() {
            const r = await fetch(`${WEB_URL}?action=getMapel`);
            const m = await r.json();
            let h = m.map(x => `<button onclick="checkToken('${x.link}','${x.token}','${x.nama}')" class="btn-mapel">${x.nama}</button>`).join('');
            Swal.fire({ title: 'Pilih Mata Pelajaran', html: h, showConfirmButton: false, allowOutsideClick: false });
        }

        function checkToken(link, token, nama) {
            Swal.fire({ 
                title: 'Konfirmasi Token', 
                text: 'Mapel: ' + nama,
                input: 'text',
                showCancelButton: true,
                cancelButtonText: 'Batal/Kembali',
                confirmButtonText: 'Mulai'
            }).then(res => {
                if (res.isConfirmed) {
                    if (res.value === String(token)) { 
                        mapelNow = nama; 
                        startExam(link); 
                    } else {
                        Swal.fire('Token Salah', '', 'error').then(() => loadMapel());
                    }
                } else {
                    loadMapel(); // Kembali ke pemilihan mapel
                }
            });
        }

        async function startExam(url) {
            isExamActive = true;
            document.getElementById('exam-screen').style.display = 'block';
            document.getElementById('exam-container').src = url;
            document.documentElement.requestFullscreen().catch(() => {});
            
            // Presensi Otomatis Horizontal[cite: 2, 3]
            fetch(`${WEB_URL}?action=presensi&nama=${encodeURIComponent(student.nama)}&mapel=${encodeURIComponent(mapelNow)}`);
        }

        async function verifyPin(action) {
            const pin = action === 'checkPin' ? document.getElementById('pin-input').value : (await Swal.fire({title:'Masukkan PIN Keluar', input:'password', showCancelButton: true})).value;
            if(!pin) return;

            const r = await fetch(`${WEB_URL}?action=${action}&pin=${pin}`);
            const d = await r.json();
            if (d.status === "valid") {
                if(action === 'checkPin') {
                    localStorage.removeItem("locked");
                    location.reload();
                } else {
                    // Integrasi dengan Android Studio (Buka Kunci Kios)
                    if (window.AndroidControl) {
                        window.AndroidControl.keluarUjian();
                    } else {
                        location.reload(); 
                    }
                }
            } else {
                Swal.fire('PIN Salah', '', 'error');
            }
        }
    </script>
</body>
</html>
