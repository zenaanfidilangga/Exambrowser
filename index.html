<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPESHA EXAMBRO</title>
    <link rel="icon" type="image/png" href="https://smpshalahuddin.sch.id/wp-content/uploads/2025/12/cropped-LOGO-SPESHA-1.png">
    <style>
        :root { --primary: #1a252f; --danger: #c0392b; --success: #27ae60; --warning: #f39c12; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f3f5; overflow: hidden; user-select: none; }
        
        .header { background: var(--primary); color: white; padding: 0 15px; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; width: 100%; z-index: 1000; height: 65px; box-sizing: border-box; border-bottom: 3px solid #3498db; }
        .h-brand { font-weight: bold; font-size: 14px; color: #3498db; display: flex; align-items: center; }
        .h-user { font-size: 11px; flex-grow: 1; margin: 0 15px; line-height: 1.2; border-left: 1px solid #555; padding-left: 10px; }
        .h-p { color: var(--warning); font-weight: bold; font-size: 14px; margin-right: 15px; }
        .btn-exit { background: transparent; border: 2px solid white; color: white; padding: 6px 14px; cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 12px; }

        .page { display: none; height: 100vh; width: 100vw; padding-top: 65px; box-sizing: border-box; }
        .active { display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 85%; max-width: 380px; text-align: center; }
        input, select { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; text-align: center; }
        .btn-action { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; display: flex; justify-content: center; align-items: center; gap: 8px;}
        
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; color: white; flex-direction: column; justify-content: center; align-items: center; padding: 30px; text-align: center; }
        .heavy { background: radial-gradient(circle, #8b0000 0%, #000 100%); border: 5px solid #c0392b; }
        .heavy h1 { font-size: 2.5rem; margin-bottom: 10px; color: #ff4d4d; }
    </style>
</head>
<body>

    <div class="header">
        <div class="h-brand">
            <!-- REVISI: LOGO DI HEADER -->
            <img src="https://smpshalahuddin.sch.id/wp-content/uploads/2025/12/cropped-LOGO-SPESHA-1.png" width="24" style="margin-right: 8px;">
            SPESHA EXAMBRO
        </div>
        <div class="h-user" id="h-info">Identitas Siswa</div>
        <div class="h-p" id="h-p">P: 0</div>
        <button class="btn-exit" onclick="askExit()">KELUAR</button>
    </div>

    <!-- HALAMAN LOGIN -->
    <div id="p-login" class="page active">
        <div class="card">
            <img src="https://smpshalahuddin.sch.id/wp-content/uploads/2025/12/cropped-LOGO-SPESHA-1.png" width="80" style="margin-bottom:15px;">
            <h2 style="margin-top:0;">LOGIN PESERTA</h2>
            <input type="text" id="u" placeholder="Username">
            <input type="password" id="p" placeholder="Password">
            <button id="btn-login" class="btn-action" style="background:var(--primary); color:white;" onclick="doLogin()">MASUK</button>
        </div>
    </div>

    <!-- HALAMAN PILIH MAPEL -->
    <div id="p-mapel" class="page">
        <div class="card">
            <h2>PILIH UJIAN</h2>
            <select id="s-mapel"></select>
            <button class="btn-action" style="background:var(--primary); color:white;" onclick="goToken()">LANJUT</button>
        </div>
    </div>

    <!-- HALAMAN TOKEN -->
    <div id="p-token" class="page">
        <div class="card">
            <h2 id="t-name">MATA PELAJARAN</h2>
            <input type="text" id="tk" placeholder="Masukkan Token">
            <div style="display:flex; gap:10px;">
                <button class="btn-action" style="background:#95a5a6; color:white;" onclick="pindah('p-mapel')">BATAL</button>
                <button id="btn-token" class="btn-action" style="background:var(--success); color:white;" onclick="startExam()">KONFIRMASI</button>
            </div>
        </div>
    </div>

        }
<!-- Bagian CSS & Header tetap sama seperti sebelumnya, hanya ganti bagian Iframe dan Script ini -->

    <!-- PANEL UJIAN DENGAN SECURITY SANDBOX -->
    <div id="p-exam" class="page" style="padding:0; padding-top:65px;">
        <!-- sandbox="allow-forms allow-scripts allow-same-origin" 
             Tanpa "allow-popups" dan "allow-top-navigation" agar link eksternal Google Form lumpuh -->
        <iframe id="f-exam" 
                src="" 
                sandbox="allow-forms allow-scripts allow-same-origin allow-modals"
                style="width:100%; height:100%; border:none;"></iframe>
    </div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbxr36rJKPOCusxmZl60Z7RI2HKuChDwd3XSzItyeZ4Koenp2_nN4mNlEr0oNkePn8Sewg/exec"; 
    let user = {}, curMapel = {}, pCount = 0, isLive = false, isHeavy = false, isSystemAction = false;

    // 1. LOCK LAYAR & ANTI-REFRESH
    window.onbeforeunload = function() {
        if(isLive) return "Ujian sedang berlangsung! Keluar akan dianggap pelanggaran.";
    };

    // 2. FUNGSI ALERT KHUSUS AGAR TIDAK DIHITUNG PELANGGARAN
    function appAlert(msg) {
        isSystemAction = true;
        alert(msg);
        setTimeout(() => { isSystemAction = false; }, 500);
    }

    // 3. DETEKSI PELANGGARAN (BLUR & VISIBILITY)
    document.addEventListener("visibilitychange", function() {
        if (document.visibilityState === 'hidden' && isLive && !isHeavy && !isSystemAction) {
            handleViolation();
        }
    });

    window.addEventListener('blur', function() {
        if(isLive && !isHeavy && !isSystemAction) {
            handleViolation();
        }
    });

    function handleViolation() {
        pCount++;
        document.getElementById('h-p').innerText = "P: " + pCount;
        fetch(`${API}?action=updateP&row=${user.row}&count=${pCount}`); 
        
        if(pCount >= 2) {
            showLock("proctor", "APLIKASI TERKUNCI", "Pelanggaran terdeteksi 2x.\nMasukkan KODE PROKTOR.");
        } else {
            appAlert("⚠️ PERINGATAN (1/2): Dilarang keluar dari aplikasi atau membuka menu lain!");
        }
    }

    // 4. PEMICU PELANGGARAN BERAT (BACK / RECENT / GESTURE)
    // Kita paksa history tetap di halaman yang sama
    function preventBack() {
        window.history.pushState(null, null, window.location.href);
    }

    window.addEventListener('popstate', function() {
        if(isLive) {
            isHeavy = true;
            preventBack();
            showLock("principal", "PELANGGARAN BERAT", "Deteksi navigasi ilegal (Tombol Back/Recent)!\nHubungi KEPALA SEKOLAH.");
        }
    });

    // Inisialisasi pencegah back
    setInterval(() => { if(isLive) preventBack(); }, 1000);

    // 5. LOGIN & START EXAM (Fungsi lain tetap sama)
    async function startExam() {
        const inputToken = document.getElementById('tk').value.trim();
        if(!inputToken) return appAlert("⚠️ Masukkan Token!");

        if(inputToken.toUpperCase() === curMapel.token.toUpperCase()) {
            const btn = document.getElementById('btn-token');
            btn.innerText = "MEMPROSES...";
            
            await fetch(`${API}?action=presensi&nama=${encodeURIComponent(user.nama)}&kelas=${encodeURIComponent(user.kelas)}&mapel=${encodeURIComponent(curMapel.nama)}`);
            
            // Set sumber iframe dan aktifkan mode ujian
            document.getElementById('f-exam').src = curMapel.link;
            isLive = true; 
            pindah('p-exam');
            
            // Minta Fullscreen
            const elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
            
            preventBack();
        } else {
            appAlert("❌ Token Salah!");
        }
    }

    // 6. LOCK SYSTEM (REVISI KODE KELUAR F2)
    function askExit() {
        showLock("exit", "KONFIRMASI KELUAR", "Masukkan PIN KELUAR (Sheet1 F2).");
    }

    function showLock(type, title, msg) {
        isSystemAction = true; 
        const ov = document.getElementById('l-ovr');
        ov.style.display = 'flex';
        if(type === 'principal') ov.classList.add('heavy');
        
        document.getElementById('l-ttl').innerText = title;
        document.getElementById('l-msg').innerText = msg;
        
        const btn = document.getElementById('l-btn');
        btn.onclick = async () => {
            const code = document.getElementById('l-inp').value.trim();
            if(!code) return appAlert("⚠️ Masukkan Kode!");
            
            btn.innerText = "MENGECEK...";
            const res = await fetch(`${API}?action=checkCode&type=${type}&code=${encodeURIComponent(code)}`);
            const d = await res.json();
            
            if(d.status === 'valid') {
                location.reload(); // Kembali ke Login
            } else {
                appAlert("❌ Kode Salah!");
            }
            btn.innerText = "BUKA AKSES";
        };
    }

    // Fungsi pembantu lainnya (doLogin, loadMapel, pindah) tetap sama...
</script>
