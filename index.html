<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPESHA EXAMBRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --danger: #e74c3c; --success: #27ae60; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f0f2f5; overflow: hidden; user-select: none; }
        .header { background: var(--primary); color: white; padding: 8px 15px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; position: fixed; top: 0; width: 100%; z-index: 100; box-sizing: border-box; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .page { display: none; height: 100vh; width: 100vw; padding: 20px; box-sizing: border-box; }
        .active { display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .login-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        .logo-login { width: 80px; margin-bottom: 15px; }
        .input-group { position: relative; margin-bottom: 15px; width: 100%; }
        .input-group i { position: absolute; left: 15px; top: 12px; color: #95a5a6; }
        .input-group input, .input-group select { width: 100%; padding: 12px 15px 12px 45px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        button.btn-primary { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #layarBlokir { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #fff; z-index: 9999; text-align: center; padding: 50px 20px; }
    </style>
</head>
<body>

    <div id="headerApp" class="header" style="display:none;">
        <div class="header-left">SPESHA EXAMBRO</div>
        <div class="header-right">
            <span id="txtSiswa">Siswa</span> | <span id="txtKelas">Kelas</span>
            <span id="txtPelanggaran" style="background:#f39c12; padding:2px 8px; border-radius:10px; font-size:11px;">P: 0/3</span>
            <i class="fa-solid fa-power-off" onclick="mintaPinKeluar()" style="color:#ff7675; cursor:pointer; margin-left:10px;"></i>
        </div>
    </div>

    <!-- PAGE LOGIN -->
    <div id="pageLogin" class="page active">
        <div class="login-card">
            <img src="https://smpshalahuddin.sch.id/wp-content/uploads/2025/12/cropped-LOGO-SPESHA-1.png" class="logo-login" alt="Logo">[cite: 4]
            <h3 style="margin-top:0; color:var(--primary);">LOGIN PESERTA</h3>
            <div class="input-group"><i class="fa-solid fa-user"></i><input type="text" id="username" placeholder="Username"></div>
            <div class="input-group"><i class="fa-solid fa-lock"></i><input type="password" id="password" placeholder="Password"></div>
            <button class="btn-primary" onclick="doLogin()">MASUK</button>
        </div>
    </div>

    <!-- PAGE PILIH MAPEL -->
    <div id="pageMapel" class="page">
        <div class="login-card">
            <i class="fa-solid fa-book-open" style="font-size: 40px; color: var(--accent); margin-bottom: 10px;"></i>
            <h3 style="color:var(--primary);">MATA PELAJARAN</h3>
            <div class="input-group">
                <i class="fa-solid fa-list-check"></i>
                <select id="selectMapel"><option value="">Memuat...</option></select>
            </div>
            <button class="btn-primary" onclick="keToken()">LANJUTKAN</button>
        </div>
    </div>

    <!-- PAGE TOKEN -->
    <div id="pageToken" class="page">
        <div class="login-card">
            <h3 id="judulMapel" style="color:var(--primary);">UJIAN</h3>
            <div class="input-group"><i class="fa-solid fa-key"></i><input type="text" id="tokenUjian" placeholder="Masukkan Token"></div>
            <div style="display:flex; gap:10px;">
                <button onclick="pindahKe('pageMapel')" style="flex:1; background:#95a5a6; border:none; color:white; border-radius:8px;">BATAL</button>
                <button onclick="prosesMulai()" style="flex:1; background:var(--success); border:none; color:white; border-radius:8px; padding:12px;">KONFIRMASI</button>
            </div>
        </div>
    </div>

    <!-- PAGE UJIAN -->
    <div id="pageUjian" class="page" style="padding:0; padding-top:40px;">
        <iframe id="frameUjian" src="" style="width:100%; height:100%; border:none;"></iframe>
    </div>

    <script>
        const URL_GAS = "https://script.google.com/macros/s/AKfycbxr36rJKPOCusxmZl60Z7RI2HKuChDwd3XSzItyeZ4Koenp2_nN4mNlEr0oNkePn8Sewg/exec"; // GANTI DENGAN URL DEPLOYMENT BAPAK
        let userSiswa = {}; 
        let listMapel = []; 
        let mapelAktif = {};

        function pindahKe(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function doLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if(!u || !p) return alert("Isi Username & Password!");
            
            try {
                const res = await fetch(`${URL_GAS}?action=login&user=${u}&pass=${p}`);
                const d = await res.json();
                if (d.status === "success") {
                    userSiswa = d;
                    document.getElementById('txtSiswa').innerText = d.nama;
                    document.getElementById('txtKelas').innerText = d.kelas;
                    muatMapel();
                    pindahKe('pageMapel');
                } else alert("Login Gagal! Periksa kembali data Anda.");
            } catch(e) { alert("Error koneksi ke Server."); }
        }

        async function muatMapel() {
            const res = await fetch(`${URL_GAS}?action=getMapel`);
            listMapel = await res.json();
            const sel = document.getElementById('selectMapel');
            sel.innerHTML = '<option value="">-- Pilih Mapel --</option>';
            listMapel.forEach(m => sel.innerHTML += `<option value="${m.nama}">${m.nama}</option>`);
        }

        function keToken() {
            const val = document.getElementById('selectMapel').value;
            mapelAktif = listMapel.find(m => m.nama === val);
            if(mapelAktif) {
                document.getElementById('judulMapel').innerText = mapelAktif.nama;
                pindahKe('pageToken');
            } else alert("Pilih Mata Pelajaran!");
        }

        async function prosesMulai() {
            const tk = document.getElementById('tokenUjian').value;
            if (tk === mapelAktif.token) {
                // Kirim Presensi Otomatis
                await fetch(`${URL_GAS}?action=presensi&nama=${userSiswa.nama}&kelas=${userSiswa.kelas}&mapel=${mapelAktif.nama}`);
                
                document.getElementById('headerApp').style.display = 'flex';
                document.getElementById('frameUjian').src = mapelAktif.link;
                pindahKe('pageUjian');
            } else alert("Token Salah!");
        }

        function mintaPinKeluar() {
            const pin = prompt("Masukkan PIN Proktor:");
            if(pin) {
                fetch(`${URL_GAS}?action=checkExitPin&pin=${pin}`)
                .then(r => r.json())
                .then(d => {
                    if(d.status === "valid" && window.AndroidControl) window.AndroidControl.keluarUjian();
                    else if(d.status !== "valid") alert("PIN Salah!");
                });
            }
        }
    </script>
</body>
</html>
