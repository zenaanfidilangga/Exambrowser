<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPESHA EXAMBRO</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --blue-primary: #0056b3; --blue-light: #007bff; --bg-gray: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: var(--bg-gray); user-select: none; overflow: hidden; }
        
        /* Header */
        header { background: var(--blue-primary); color: white; padding: 10px 20px; display: flex; align-items: center; justify-content: center; gap: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        header img { height: 40px; width: 40px; }
        header h1 { font-size: 1.5rem; margin: 0; letter-spacing: 1px; }

        /* Login Container */
        #login-page { display: flex; justify-content: center; align-items: center; height: 90vh; }
        .login-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        .login-box img { width: 80px; margin-bottom: 10px; }
        .login-box h2 { margin: 5px 0; color: #333; font-size: 1.2rem; }
        .login-box p { color: #666; margin-bottom: 20px; }
        
        .input-group { position: relative; margin-bottom: 15px; }
        .input-group i { position: absolute; left: 15px; top: 12px; color: #aaa; }
        .input-group input { width: 100%; padding: 12px 12px 12px 40px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none; }
        
        .btn-login { width: 100%; padding: 12px; background: var(--blue-light); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-login:hover { background: var(--blue-primary); }

        /* Exam Interface */
        #exam-page { display: none; height: 100vh; grid-template-columns: 1fr 300px; }
        .main-content { padding: 20px; overflow-y: auto; background: white; position: relative; }
        .sidebar { background: #f8f9fa; border-left: 1px solid #ddd; padding: 20px; display: flex; flex-direction: column; transition: 0.3s; }
        
        /* Question List */
        .q-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px; }
        .q-item { padding: 10px; text-align: center; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; }
        .q-red { background: #dc3545; }
        .q-green { background: #28a745; }
        .q-yellow { background: #ffc107; color: black; }

        /* Footer Navigation */
        .exam-footer { position: fixed; bottom: 0; left: 0; width: 100%; background: #eee; padding: 15px; display: flex; justify-content: center; gap: 20px; align-items: center; border-top: 1px solid #ccc; }
        .btn-nav { padding: 10px 20px; border-radius: 5px; border: none; cursor: pointer; }
        .btn-ragu { display: flex; align-items: center; gap: 8px; font-weight: bold; }

        /* Fullscreen Lock Overlay */
        #lock-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); color: white; z-index: 9999; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        
        @media (max-width: 768px) {
            #exam-page { grid-template-columns: 1fr; }
            .sidebar { position: fixed; right: -300px; height: 100%; width: 250px; z-index: 100; }
            .sidebar.active { right: 0; }
        }
    </style>
</head>
<body>

    <div id="lock-overlay">
        <h1>AKSES TERKUNCI</h1>
        <p>Anda melakukan pelanggaran lebih dari 2 kali.<br>Hubungi Proktor untuk membuka kunci.</p>
        <input type="password" id="proctor-unlock" placeholder="Kode Proktor" style="padding:10px; border-radius:5px; border:none; margin-top:20px;">
        <button onclick="unlockApp()" style="margin-top:10px; padding:10px 20px; background:green; color:white; border:none; border-radius:5px;">Buka Kunci</button>
    </div>

    <header id="app-header">
        <img src="https://smpshalahuddin.sch.id/wp-content/uploads/2025/12/cropped-LOGO-SPESHA-1.png" alt="Logo">
        <h1>SPESHA EXAMBRO</h1>
    </header>

    <div id="login-page">
        <div class="login-box">
            <img src="https://smpshalahuddin.sch.id/wp-content/uploads/2025/12/cropped-LOGO-SPESHA-1.png" alt="App Icon">
            <h2>SPESHA EXAMBRO</h2>
            <p>Selamat Datang</p>
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="username" placeholder="Username">
            </div>
            <div class="input-group">
                <i class="fas fa-key"></i>
                <input type="password" id="password" placeholder="Password">
            </div>
            <button class="btn-login" onclick="attemptLogin()">Login</button>
        </div>
    </div>

    <div id="identity-page" style="display:none; text-align:center; padding:50px;">
        <h2>Verifikasi Identitas</h2>
        <p id="user-display"></p>
        <div id="mapel-list" style="margin-top:20px;"></div>
    </div>

    <div id="exam-page">
        <div class="main-content">
            <iframe id="exam-frame" src="" style="width:100%; height:80vh; border:none;"></iframe>
            <div class="exam-footer">
                <button class="btn-nav" style="background:#6c757d; color:white;"><i class="fas fa-arrow-left"></i> Kembali</button>
                <div class="btn-ragu">
                    <input type="checkbox" id="check-ragu" onchange="toggleRagu()"> <label for="check-ragu">Ragu-ragu</label>
                </div>
                <button class="btn-nav" style="background:var(--blue-light); color:white;">Berikutnya <i class="fas fa-arrow-right"></i></button>
                <button id="btn-kirim" class="btn-nav" style="background:green; color:white; display:none;" onclick="submitExam()">Kirim</button>
            </div>
        </div>
        <div class="sidebar" id="sidebar">
            <button onclick="document.getElementById('sidebar').classList.toggle('active')" style="align-self: flex-end;">Tutup X</button>
            <h3>Daftar Soal</h3>
            <div class="q-grid" id="q-grid">
                </div>
        </div>
    </div>

    <script>
        let userData = {};
        let violationCount = 0;
        let scriptURL = "https://script.google.com/macros/s/AKfycbz5dxv9fvUzKrxQWH80ZECgh_bUGvrsf_VqqTSBBFHvC-3qVZBVA8SZ6JjZ44QyL20pSA/exec";

        // Anti-Cheat: Fullscreen & Lock
        function startKioskMode() {
            document.documentElement.requestFullscreen().catch(e => console.log(e));
            window.onblur = () => {
                violationCount++;
                if(violationCount >= 2) {
                    document.getElementById('lock-overlay').style.display = 'flex';
                } else {
                    Swal.fire('Peringatan!', 'Dilarang keluar aplikasi! Pelanggaran: ' + violationCount + '/2', 'warning');
                }
            };
        }

        // Disable Copy-Paste & Right Click
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && (e.key === 'c' || e.key === 'v' || e.key === 'u')) e.preventDefault();
        });

        async function attemptLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            // Simulasi fetch (ganti dengan fetch asli ke GAS)
            // if response success:
            startKioskMode();
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('identity-page').style.display = 'block';
            document.getElementById('user-display').innerText = "Nama: Budi Santoso | Kelas: 9A";
            loadMapel();
        }

        function loadMapel() {
            // Fetch mapel dari GAS
            const mapelContainer = document.getElementById('mapel-list');
            const mapelDummy = [{name: "Matematika", token: "MTK123", time: "08:00"}];
            mapelDummy.forEach(m => {
                const btn = document.createElement('button');
                btn.innerText = m.name;
                btn.className = "btn-login";
                btn.onclick = () => startExam(m);
                mapelContainer.appendChild(btn);
            });
        }

        function startExam(mapel) {
            Swal.fire({
                title: 'Masukkan Token',
                input: 'text',
                showCancelButton: true
            }).then(res => {
                if(res.value === mapel.token) {
                    document.getElementById('identity-page').style.display = 'none';
                    document.getElementById('exam-page').style.display = 'grid';
                    document.getElementById('exam-frame').src = "https://docs.google.com/forms/d/e/.../viewform?embedded=true";
                    initQuestionList();
                } else {
                    Swal.fire('Error', 'Token Salah!', 'error');
                }
            });
        }

        function initQuestionList() {
            const grid = document.getElementById('q-grid');
            for(let i=1; i<=20; i++) {
                const div = document.createElement('div');
                div.className = "q-item q-red";
                div.innerText = i;
                grid.appendChild(div);
            }
        }

        function toggleRagu() {
            const activeQ = document.querySelector('.q-item'); // Simulasi
            if(document.getElementById('check-ragu').checked) {
                activeQ.className = "q-item q-yellow";
            }
        }

        function unlockApp() {
            const code = document.getElementById('proctor-unlock').value;
            if(code === "PROKTOR2026") { // Ganti dengan data dari sheet
                violationCount = 0;
                document.getElementById('lock-overlay').style.display = 'none';
            }
        }
    </script>
</body>
</html>
