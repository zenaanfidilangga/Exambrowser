<script>
    // --- KONFIGURASI WEB APP ---
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyR06T-Vn6NlV1Tz6h76166_4n7V_x_O_f/exec"; 
    
    let masterProctorCode = "1234"; 
    let currentSiswa = null;
    let violations = 0;

    function initCheck() {
        if (localStorage.getItem("isLocked") === "true") {
            showBlocker();
        }
    }

    // DETEKSI CURANG
    window.onblur = function() {
        if (currentSiswa) {
            violations++;
            if (violations >= 2) {
                executeLock();
            } else {
                Swal.fire({
                    title: 'PERINGATAN!',
                    text: 'Jangan keluar aplikasi atau menarik bar notifikasi! Pelanggaran: ' + violations + '/2',
                    icon: 'warning'
                });
            }
        }
    };

    function executeLock() {
        localStorage.setItem("isLocked", "true");
        showBlocker();
    }

    function showBlocker() {
        document.getElementById('persistent-lock').style.display = 'flex';
    }

    function masterUnlock() {
        const input = document.getElementById('p-unlock-code').value;
        if (String(input).trim() === String(masterProctorCode).trim()) {
            localStorage.removeItem("isLocked");
            violations = 0;
            document.getElementById('persistent-lock').style.display = 'none';
            document.getElementById('p-unlock-code').value = "";
            Swal.fire('Akses Dibuka', 'Silakan gunakan aplikasi kembali.', 'success');
        } else {
            Swal.fire('GAGAL', 'Kode PIN Proktor Salah!', 'error');
        }
    }

    // LOGIN
    async function processLogin() {
        const user = document.getElementById('u-name').value;
        const pass = document.getElementById('u-pass').value;

        if (!user || !pass) return Swal.fire('Isi Data', 'Username dan Password wajib diisi', 'info');

        Swal.fire({ title: 'Menghubungkan...', didOpen: () => Swal.showLoading() });

        try {
            const res = await fetch(`${WEB_APP_URL}?action=login&user=${user}&pass=${pass}`);
            const data = await res.json();

            if (data.status === "success") {
                currentSiswa = data;
                masterProctorCode = data.proctorCode;
                
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('subject-page').style.display = 'block';
                document.getElementById('user-display').style.display = 'block';
                document.getElementById('user-display').innerText = `${data.nama} (${data.kelas})`;
                
                Swal.close();
                document.documentElement.requestFullscreen().catch(() => {}); 
                loadMapel();
            } else {
                Swal.fire('Gagal', 'Akun tidak ditemukan atau password salah.', 'error');
            }
        } catch (e) {
            Swal.fire('Error', 'Gagal memanggil data. Periksa Apps Script.', 'error');
        }
    }

    // AMBIL MAPEL
    async function loadMapel() {
        const container = document.getElementById('list-mapel-container');
        container.innerHTML = "Memuat mata pelajaran...";

        try {
            const res = await fetch(`${WEB_APP_URL}?action=getMapel`);
            const items = await res.json();
            
            container.innerHTML = "";
            items.forEach(m => {
                const div = document.createElement('div');
                div.className = "card-mapel";
                div.innerHTML = `<i class="fas fa-book" style="font-size: 2rem; color: var(--primary);"></i><br><br>
                                 <strong>${m.nama}</strong><br><small>Waktu: ${m.jam}</small>`;
                div.onclick = () => confirmToken(m);
                container.appendChild(div);
            });
        } catch (e) {
            container.innerHTML = "Gagal memuat data.";
        }
    }

    // VERIFIKASI TOKEN (PERBAIKAN TOTAL)
    function confirmToken(m) {
        Swal.fire({
            title: 'Konfirmasi Token',
            text: `Masukkan Token untuk ${m.nama}`,
            input: 'text',
            showCancelButton: true,
            confirmButtonText: 'Mulai Ujian',
            inputAttributes: {
                autocapitalize: 'off',
                autocorrect: 'off'
            }
        }).then(r => {
            if (r.isConfirmed) {
                // 1. Ambil input siswa, hilangkan spasi, jadikan huruf kecil
                const tokenSiswa = String(r.value).trim().toLowerCase();
                
                // 2. Ambil data dari sheet, pastikan jadi teks, hilangkan spasi, jadikan huruf kecil
                const tokenSheet = String(m.token).trim().toLowerCase();

                // 3. Bandingkan
                if (tokenSiswa === tokenSheet) {
                    startExamNow(m.link);
                } else {
                    Swal.fire({
                        title: 'Token Salah!',
                        html: `Token yang Anda masukkan: <b>${tokenSiswa}</b><br>Tidak cocok dengan sistem.`,
                        icon: 'error'
                    });
                }
            }
        });
    }

    function startExamNow(link) {
        let finalLink = link;
        if (link.includes("/edit")) {
            finalLink = link.split("/edit")[0] + "/viewform";
        }
        
        document.getElementById('subject-page').style.display = 'none';
        document.getElementById('app-header').style.display = 'none';
        document.getElementById('exam-page').style.display = 'grid';
        document.getElementById('frame-soal').src = finalLink;

        const grid = document.getElementById('nomor-soal-grid');
        grid.innerHTML = "";
        for(let i=1; i<=40; i++) {
            let n = document.createElement('div');
            n.className = "q-num";
            n.innerText = i;
            grid.appendChild(n);
        }
    }

    function confirmSelesai() {
        Swal.fire({
            title: 'Selesai Ujian?',
            text: 'Pastikan sudah klik SUBMIT di dalam formulir soal.',
            icon: 'question',
            showCancelButton: true
        }).then(r => { if(r.isConfirmed) location.reload(); });
    }

    document.addEventListener('contextmenu', e => e.preventDefault());
</script>
