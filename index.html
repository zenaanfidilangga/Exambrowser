<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHA EXAMBRO</title>
    <style>
        :root { --blue: #1a73ce; --light: #e8f0fe; --red: #d93025; }
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #f4f7f6; height: 100%; overflow: hidden; }
        
        /* Login & Mapel UI */
        .page { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .box { background: white; padding: 35px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 340px; text-align: center; }
        .header-blue { background: var(--blue); color: white; width: 100%; padding: 15px; position: fixed; top: 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; background: var(--blue); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn:hover { background: #1557a0; }

        /* Exam UI */
        #exam-page { display: none; height: 100vh; grid-template-rows: auto 1fr auto; grid-template-columns: 1fr 280px; }
        .exam-nav { grid-column: 1 / span 2; background: white; padding: 10px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ddd; }
        .timer-box { background: var(--light); color: var(--red); padding: 8px 20px; border-radius: 25px; font-weight: bold; font-size: 20px; }
        iframe { width: 100%; height: 100%; border: none; }
        .sidebar { background: white; border-left: 1px solid #ddd; padding: 20px; overflow-y: auto; }
        
        /* Fullscreen Lock Overlay */
        #lock-screen { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); color: white; z-index: 9999; text-align: center; padding-top: 15vh; }
    </style>
</head>
<body>

<div id="login-page" class="page">
    <div class="header-blue">
        <img src="https://smpshalahuddin.sch.id/wp-content/uploads/2025/12/cropped-LOGO-SPESHA-1.png" height="35">
        <span style="font-weight:bold; letter-spacing:1px;">SHA EXAMBRO</span>
    </div>
    <div class="box">
        <img src="https://smpshalahuddin.sch.id/wp-content/uploads/2025/12/cropped-LOGO-SPESHA-1.png" height="80">
        <h2 style="margin: 10px 0;">Selamat Datang</h2>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn" id="btn-login" onclick="handleLogin()">Login</button>
        <p id="err" style="color:var(--red); display:none; font-size:13px; margin-top:10px;">Maaf salah, cek kembali data atau hubungi Proktor</p>
    </div>
</div>

<div id="mapel-page" class="page" style="display:none;">
    <div class="box" style="width: 450px;">
        <h3>Pilih Mata Pelajaran</h3>
        <div id="list-mapel" style="display: grid; gap: 10px;">Memuat data...</div>
    </div>
</div>

<div id="exam-page">
    <div class="exam-nav">
        <b id="active-title" style="color:var(--blue)">MAPEL</b>
        <div class="timer-box" id="timer-display">90:00</div>
        <button onclick="requestExit()" style="border:none; background:none; cursor:pointer; color:#999;">Keluar (1234)</button>
    </div>
    <iframe id="exam-frame"></iframe>
    <div class="sidebar">
        <b>Daftar Soal</b>
        <div id="q-grid" style="display:grid; grid-template-columns: repeat(5,1fr); gap:8px; margin-top:15px;"></div>
        <button style="margin-top:20px; background: #ffcc00; border:none; padding:10px; width:100%; font-weight:bold; border-radius:5px;">RAGU-RAGU</button>
    </div>
</div>

<div id="lock-screen">
    <h1 style="color:var(--red); font-size: 40px;">UJIAN TERKUNCI</h1>
    <p>Anda melanggar aturan (pindah tab/aplikasi/keluar fullscreen).</p>
    <p>Silakan hubungi Proktor untuk membuka kembali.</p><br>
    <input type="password" id="p-input" placeholder="Kode Proktor" style="width:250px; text-align:center;"><br>
    <button class="btn" style="width:250px;" onclick="unlock()">Buka Kunci</button>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwOJU0dGs4kZdHlP0As_rqMD7PtUdV6bGX8nORD8gdp/dev";
    let uRow, pCode, vCount = 0;

    async function handleLogin() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        document.getElementById('btn-login').innerText = "Verifikasi...";
        
        try {
            const res = await fetch(`${SCRIPT_URL}?action=login&user=${u}&pass=${p}`);
            const d = await res.json();
            if(d.status === "success") {
                uRow = d.row; pCode = d.pCode; vCount = d.violation;
                if(vCount >= 2) return forceLock();
                document.getElementById('login-page').style.display = 'none';
                showMapels();
            } else { throw "error"; }
        } catch(e) { 
            document.getElementById('err').style.display = 'block';
            document.getElementById('btn-login').innerText = "Login";
        }
    }

    async function showMapels() {
        document.getElementById('mapel-page').style.display = 'flex';
        const res = await fetch(`${SCRIPT_URL}?action=getMapel`);
        const maps = await res.json();
        const container = document.getElementById('list-mapel');
        container.innerHTML = "";
        maps.forEach(m => {
            const b = document.createElement('button');
            b.className = "btn"; b.innerText = m.n;
            b.onclick = () => startExam(m.n, m.u);
            container.appendChild(b);
        });
    }

    function startExam(n, u) {
        document.getElementById('mapel-page').style.display = 'none';
        document.getElementById('exam-page').style.display = 'grid';
        document.getElementById('active-title').innerText = n;
        document.getElementById('exam-frame').src = u;
        
        document.documentElement.requestFullscreen().catch(() => {});
        startTimer(90);
        setupSecurity();
        for(let i=1; i<=40; i++) {
            const d = document.createElement('div');
            d.style = "border:1px solid #ccc; text-align:center; padding:8px; border-radius:4px; font-size:12px; font-weight:bold;";
            d.innerText = i;
            document.getElementById('q-grid').appendChild(d);
        }
    }

    function startTimer(m) {
        let s = m * 60;
        setInterval(() => {
            let mins = Math.floor(s/60); let secs = s%60;
            document.getElementById('timer-display').innerText = `${mins}:${secs<10?'0':''}${secs}`;
            if(s-- <= 0) { alert("Waktu Habis!"); window.location.reload(); }
        }, 1000);
    }

    function setupSecurity() {
        // Deteksi Keluar (Blur)
        window.onblur = () => {
            vCount++;
            fetch(`${SCRIPT_URL}?action=updateV&row=${uRow}&count=${vCount}`);
            if(vCount >= 2) forceLock();
            else alert("Peringatan! Jangan keluar dari aplikasi.");
        };
        // Blokir Klik Kanan & Keyboard
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = (e) => { if(e.ctrlKey && 'cvu'.includes(e.key)) return false; };
    }

    function forceLock() { document.getElementById('lock-screen').style.display = 'block'; }

    function unlock() {
        if(document.getElementById('p-input').value === pCode) {
            vCount = 0;
            fetch(`${SCRIPT_URL}?action=updateV&row=${uRow}&count=0`);
            document.getElementById('lock-screen').style.display = 'none';
            document.documentElement.requestFullscreen();
        } else { alert("Kode Proktor Salah!"); }
    }

    function requestExit() {
        if(prompt("Masukkan Kode Keluar:") === "1234") window.location.reload();
    }
</script>
</body>
</html>
