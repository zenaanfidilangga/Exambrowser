<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPESHA EXAMBRO</title>
    <!-- Tambahkan Font Awesome untuk Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --danger: #e74c3c;
            --success: #27ae60;
        }

        body {
            margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5; overflow: hidden; user-select: none;
        }

        /* HEADER RINGKAS */
        .header {
            background: var(--primary); color: white; padding: 8px 15px;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 13px; position: fixed; top: 0; width: 100%; z-index: 100;
            box-sizing: border-box; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .header-left { font-weight: bold; }
        .header-right { display: flex; align-items: center; gap: 10px; }
        .badge-warning { background: #f39c12; padding: 2px 8px; border-radius: 10px; font-size: 11px; }

        /* LOGIN STYLE PROFESIONAL */
        .page {
            display: none; height: 100vh; width: 100vw;
            padding: 20px; box-sizing: border-box;
        }
        .active { display: flex; flex-direction: column; justify-content: center; align-items: center; }

        .login-card {
            background: white; padding: 30px; border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px;
            text-align: center;
        }

        .logo-login { width: 80px; margin-bottom: 15px; }

        .input-group {
            position: relative; margin-bottom: 15px; width: 100%;
        }
        .input-group i {
            position: absolute; left: 15px; top: 12px; color: #95a5a6;
        }
        .input-group input, .input-group select {
            width: 100%; padding: 12px 15px 12px 45px; border: 1px solid #ddd;
            border-radius: 8px; box-sizing: border-box; font-size: 14px;
            transition: 0.3s;
        }
        .input-group input:focus { border-color: var(--accent); outline: none; }

        button.btn-primary {
            width: 100%; padding: 12px; background: var(--primary);
            color: white; border: none; border-radius: 8px; font-weight: bold;
            cursor: pointer; margin-top: 10px;
        }

        /* OVERLAY PELANGGARAN */
        #layarBlokir {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: #000; color: #fff;
            z-index: 9999; text-align: center; padding: 50px 20px;
        }
    </style>
</head>
<body>

    <div id="headerApp" class="header" style="display:none;">
        <div class="header-left">SPESHA EXAMBRO</div>
        <div class="header-right">
            <span id="txtSiswa">Siswa</span>
            <span id="txtPelanggaran" class="badge-warning">P: 0/3</span>
            <i class="fa-solid fa-power-off" onclick="mintaPinKeluar()" style="color:#ff7675; cursor:pointer;"></i>
        </div>
    </div>

    <!-- PAGE LOGIN -->
    <div id="pageLogin" class="page active">
        <div class="login-card">
            <img src="https://zenaanfidilangga.github.io/Exambrowser/logo.png" class="logo-login" alt="Logo">
            <h3 style="margin-top:0; color:var(--primary);">LOGIN PESERTA</h3>
            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="username" placeholder="Nama Lengkap / NIS">
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Password">
            </div>
            <button class="btn-primary" onclick="login()">MASUK</button>
        </div>
    </div>

    <!-- PAGE PILIH MAPEL -->
    <div id="pageMapel" class="page">
        <div class="login-card">
            <i class="fa-solid fa-book-open" style="font-size: 40px; color: var(--accent); margin-bottom: 10px;"></i>
            <h3 style="color:var(--primary);">MATA PELAJARAN</h3>
            <div class="input-group">
                <i class="fa-solid fa-list-check"></i>
                <select id="selectMapel">
                    <option value="">-- Pilih Mapel --</option>
                    <option value="PJOK">PJOK (Olahraga)</option>
                    <option value="IPA">Ilmu Pengetahuan Alam</option>
                    <option value="MATEMATIKA">Matematika</option>
                </select>
            </div>
            <button class="btn-primary" onclick="pilihMapel()">LANJUTKAN</button>
        </div>
    </div>

    <!-- PAGE TOKEN & PRESENSI -->
    <div id="pageToken" class="page">
        <div class="login-card">
            <h3 id="judulMapel" style="color:var(--primary);">UJIAN</h3>
            <div class="input-group">
                <i class="fa-solid fa-key"></i>
                <input type="text" id="tokenUjian" placeholder="Masukkan Token">
            </div>
            <div style="display:flex; gap:10px;">
                <button onclick="pindahKe('pageMapel')" style="flex:1; background:#95a5a6; border:none; color:white; border-radius:8px;">BATAL</button>
                <button onclick="prosesMulai()" style="flex:1; background:var(--success); border:none; color:white; border-radius:8px; padding:12px;">KONFIRMASI</button>
            </div>
        </div>
    </div>

    <div id="pageUjian" class="page" style="padding:0; padding-top:40px;">
        <iframe id="frameUjian" src="" style="width:100%; height:100%; border:none;"></iframe>
    </div>

    <div id="layarBlokir">
        <i class="fa-solid fa-triangle-exclamation" style="font-size: 60px; color: var(--danger);"></i>
        <h1 style="color:var(--danger);">PELANGGARAN BERAT</h1>
        <p>HUBUNGI KEPALA SEKOLAH</p>
        <br>
        <input type="password" id="inputKodeSakti" placeholder="Kode Sakti" style="text-align:center; width:200px;">
        <br><br>
        <button onclick="cekKodeSakti()" style="background:var(--success); padding:10px 30px; color:white; border:none; border-radius:5px;">BUKA KUNCI</button>
    </div>

    <script>
        let statusUjian = "BELUM_LOGIN";
        let jumlahPelanggaran = 0;
        const KODE_SAKTI = "123456"; 
        // GANTI URL DI BAWAH DENGAN URL WEB APP GOOGLE APPS SCRIPT BAPAK
        const URL_GAS_PRESENSI = "https://script.google.com/macros/s/xxxxxx/exec";

        function pindahKe(idTarget) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(idTarget).classList.add('active');
        }

        function login() {
            const user = document.getElementById('username').value;
            if(user) {
                document.getElementById('txtSiswa').innerText = user;
                pindahKe('pageMapel');
            } else { alert("Data tidak lengkap!"); }
        }

        function pilihMapel() {
            const mapel = document.getElementById('selectMapel').value;
            if(mapel) {
                document.getElementById('judulMapel').innerText = mapel;
                pindahKe('pageToken');
            } else { alert("Pilih Mapel!"); }
        }

        function prosesMulai() {
            const token = document.getElementById('tokenUjian').value;
            if(token === "TOKEN123") {
                kirimPresensi(); // Fungsi presensi otomatis
                document.getElementById('headerApp').style.display = 'flex';
                document.getElementById('frameUjian').src = "https://docs.google.com/forms/d/e/..."; 
                pindahKe('pageUjian');
                statusUjian = "UJIAN";
            } else { alert("Token Salah!"); }
        }

        function kirimPresensi() {
            const nama = document.getElementById('txtSiswa').innerText;
            const mapel = document.getElementById('selectMapel').value;
            
            // Mengirim data ke Google Spreadsheet via GAS
            fetch(URL_GAS_PRESENSI + `?nama=${nama}&mapel=${mapel}&status=Hadir`)
            .then(res => console.log("Presensi Berhasil"))
            .catch(err => console.log("Gagal Presensi"));
        }

        // FUNGSI BLOKIR (Sama seperti sebelumnya)
        function aktifkanBlokirRingan() {
            if (statusUjian === "UJIAN") {
                jumlahPelanggaran++;
                document.getElementById('txtPelanggaran').innerText = "P: " + jumlahPelanggaran + "/3";
                if (jumlahPelanggaran >= 3) aktifkanBlokirBerat();
            }
        }

        function aktifkanBlokirBerat() {
            document.getElementById('layarBlokir').style.display = "block";
        }

        function cekKodeSakti() {
            if (document.getElementById('inputKodeSakti').value === KODE_SAKTI) {
                document.getElementById('layarBlokir').style.display = "none";
                jumlahPelanggaran = 0;
                document.getElementById('txtPelanggaran').innerText = "P: 0/3";
            }
        }

        function mintaPinKeluar() {
            if (prompt("PIN Proktor:") === KODE_SAKTI) {
                if(window.AndroidControl) window.AndroidControl.keluarUjian();
            }
        }
    </script>
</body>
</html>
