<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SHA EXAMBRO - V2</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        /* MATIKAN SCROLL TARIK BAWAH (PULL TO REFRESH) */
        html, body { 
            overscroll-behavior-y: contain; 
            overflow: hidden; 
            position: fixed; 
            width: 100%; 
            height: 100%;
        }

        :root { --blue: #1a73ce; --red: #d93025; --green: #28a745; --bg: #f8f9fa; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); user-select: none; -webkit-user-select: none; }

        /* UI LAINNYA TETAP SAMA... */
        .page { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; box-sizing: border-box; }
        #exam-page { display: none; height: 100vh; grid-template-rows: 60px 1fr 70px; background: white; }
        header { background: white; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 2px solid #eee; }
        .main-soal { padding: 20px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        /* CSS Opsi, Button, dsb (Gunakan yang sebelumnya) */
        .opsi { padding: 15px; border: 2px solid #eee; border-radius: 12px; margin-bottom: 12px; display: flex; align-items: center; cursor: pointer; }
        .opsi.active { border-color: var(--blue); background: #f0f7ff; }
        .huruf-box { width: 30px; height: 30px; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; margin-right: 15px; font-weight: bold; }
        footer { padding: 10px; display: flex; gap: 10px; border-top: 1px solid #eee; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-blue { background: var(--blue); color: white; }
        #lock-screen { position: fixed; inset: 0; background: black; color: white; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body oncontextmenu="return false">

    <div id="login-page" class="page">
        <div style="background:white; padding:30px; border-radius:20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width:100%; max-width:350px; text-align:center;">
            <img src="https://smpshalahuddin.sch.id/wp-content/uploads/2025/12/cropped-LOGO-SPESHA-1.png" width="80">
            <h3>SHA EXAMBRO</h3>
            <input type="text" id="u" placeholder="NISN Siswa" style="width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:8px;">
            <input type="password" id="p" placeholder="Password" style="width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:8px;">
            <button class="btn btn-blue" onclick="doLogin()">LOGIN</button>
        </div>
    </div>

    <div id="exam-page">
        <header>
            <b id="timer" style="color:var(--red)">00:00</b>
            <span id="shield-info" style="font-size:12px; color:var(--green)">🛡️ Mode Aman</span>
            <button onclick="toggleDrawer()" style="background:#eee; border:none; padding:8px 12px; border-radius:5px;">Daftar Soal</button>
        </header>
        <main class="main-soal">
            <b style="color:var(--blue)">Soal <span id="no-skrg">1</span></b>
            <div id="tanya" style="font-size:18px; margin:15px 0; line-height:1.5;"></div>
            <div id="opsi-list"></div>
        </main>
        <footer>
            <button class="btn" style="background:#eee" onclick="prev()">Kembali</button>
            <button class="btn btn-blue" onclick="next()">Lanjut</button>
        </footer>
    </div>

    <div id="lock-screen">
        <h2>APLIKASI TERKUNCI</h2>
        <p>Anda mencoba keluar dari mode ujian!</p>
        <input type="password" id="p-key" placeholder="Kode Proktor" style="padding:10px; border-radius:5px; border:none; margin-bottom:10px;"><br>
        <button onclick="unlock()" class="btn-blue" style="padding:10px 30px; border-radius:5px; border:none;">BUKA</button>
    </div>

    <script>
        const SCRIPT_URL = "URL_WEB_APP_ANDA";
        let listSoal = [], curr = 0, jawabanSiswa = {}, uData = {}, isStarted = false, vCount = 0;

        // CEK LOGIN
        async function doLogin() {
            const user = document.getElementById('u').value;
            const pass = document.getElementById('p').value;
            const res = await fetch(`${SCRIPT_URL}?action=login&user=${user}&pass=${pass}`);
            const d = await res.json();
            if(d.status === "success") {
                uData = d;
                document.getElementById('login-page').style.display = 'none';
                loadMapels();
            } else alert("Login Gagal!");
        }

        async function loadMapels() {
            const res = await fetch(`${SCRIPT_URL}?action=getMapel`);
            const maps = await res.json();
            // Buat pilihan mapel... (Sama seperti kode sebelumnya)
            // Setelah pilih mapel, panggil start(m);
        }

        async function start(m) {
            document.getElementById('exam-page').style.display = 'grid';
            isStarted = true;
            
            // LOCK SCREEN LOGIC
            document.documentElement.requestFullscreen().catch(() => {});
            
            // AMBIL SOAL
            const res = await fetch(`${SCRIPT_URL}?action=getSoalForm&url=${encodeURIComponent(m.url)}`);
            const data = await res.json();
            if(data.error) {
                alert(data.error);
            } else {
                listSoal = data;
                render();
                initSecurity();
            }
        }

        function initSecurity() {
            // DETEKSI PINDAH TAB / MINIMIZE
            window.onblur = () => {
                if(isStarted) {
                    vCount++;
                    if(vCount >= 2) {
                        document.getElementById('lock-screen').style.display = 'flex';
                    } else {
                        alert("PERINGATAN! Jangan keluar aplikasi!");
                        document.documentElement.requestFullscreen();
                    }
                }
            };

            // MATIKAN BACK BUTTON (Hanya berfungsi di Mode PWA/Standalone)
            window.history.pushState(null, null, window.location.href);
            window.onpopstate = function() {
                window.history.go(1);
            };
        }

        function render() {
            const s = listSoal[curr];
            document.getElementById('no-skrg').innerText = curr + 1;
            document.getElementById('tanya').innerText = s.tanya;
            // Gambar opsi... (Sama seperti kode sebelumnya)
        }
        
        // Fungsi next, prev, unlock tetap sama...
    </script>
</body>
</html>
