<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPESHA EXAMBRO</title>
    <link rel="icon" type="image/png" href="https://smpshalahuddin.sch.id/wp-content/uploads/2025/12/cropped-LOGO-SPESHA-1.png">
    <style>
        :root { --primary: #1a252f; --danger: #c0392b; --success: #27ae60; --warning: #f39c12; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f3f5; overflow: hidden; user-select: none; }
        
        /* PERBAIKAN HEADER AGAR PRESISI DI MOBILE */
        .header { background: var(--primary); color: white; padding: 0 10px; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; width: 100%; z-index: 999999 !important; height: 65px; box-sizing: border-box; border-bottom: 3px solid #3498db; }
        .h-brand { font-weight: bold; font-size: 14px; color: #3498db; display: flex; align-items: center; flex-shrink: 0; }
        .h-user { font-size: 11px; flex-grow: 1; margin: 0 10px; line-height: 1.2; border-left: 1px solid #555; padding-left: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .h-p { color: var(--warning); font-weight: bold; font-size: 14px; margin-right: 10px; flex-shrink: 0; }
        .btn-exit { background: transparent; border: 2px solid white; color: white; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 12px; flex-shrink: 0; }

        .page { display: none; height: 100vh; width: 100vw; padding-top: 65px; box-sizing: border-box; }
        .active { display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 85%; max-width: 380px; text-align: center; }
        
        /* PERBAIKAN FORM INPUT & TOMBOL AGAR RATA TENGAH */
        select, #tk { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; text-align: center; }
        #l-inp { width: 100%; max-width: 280px; padding: 14px; margin: 15px auto; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; text-align: center; text-transform:uppercase; display: block; }
        #l-btn { width: 100%; max-width: 280px; margin: 0 auto; display: flex; }
        
        .btn-action { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; display: flex; justify-content: center; align-items: center; gap: 8px;}
        
        .input-group { position: relative; margin: 12px 0; width: 100%; text-align: left; }
        .input-group svg { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); width: 22px; height: 22px; fill: #7f8c8d; transition: 0.3s; }
        .input-group input { width: 100%; padding: 14px 14px 14px 48px; border: 1.5px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; text-align: left; transition: 0.3s; }
        .input-group input:focus { border-color: #3498db; outline: none; }
        .input-group input:focus + svg { fill: #3498db; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 9999999 !important; color: white; flex-direction: column; justify-content: center; align-items: center; padding: 30px; text-align: center; box-sizing: border-box; }
        .heavy { background: radial-gradient(circle, #8b0000 0%, #000 100%); border: 5px solid #c0392b; }
        .heavy h1 { font-size: 2.5rem; margin-bottom: 10px; color: #ff4d4d; }
    </style>
</head>
<body>

    <div class="header">
        <div class="h-brand">
            <img src="https://smpshalahuddin.sch.id/wp-content/uploads/2025/12/cropped-LOGO-SPESHA-1.png" width="24" style="margin-right: 6px;" alt="Logo Spesha">
            SPESHA
        </div>
        <div class="h-user" id="h-info">Belum Login</div>
        <div class="h-p" id="h-p">P: 0</div>
        <button class="btn-exit" onclick="askExit()">KELUAR</button>
    </div>

    <div id="p-login" class="page active">
        <div class="card">
            <img src="https://smpshalahuddin.sch.id/wp-content/uploads/2025/12/cropped-LOGO-SPESHA-1.png" width="80" style="margin-bottom:15px;" alt="Logo">
            <h2 style="margin-top:0; color:#2c3e50;">LOGIN PESERTA</h2>
            
            <div class="input-group">
                <input type="text" id="u" placeholder="Username">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            </div>
            
            <div class="input-group">
                <input type="password" id="p" placeholder="Password">
                <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
            </div>

            <button id="btn-login" class="btn-action" style="background:var(--primary); color:white; margin-top:15px;" onclick="doLogin()">MASUK</button>
        </div>
    </div>

    <div id="p-mapel" class="page">
        <div class="card">
            <h2>PILIH UJIAN</h2>
            <select id="s-mapel"></select>
            <button class="btn-action" style="background:var(--primary); color:white;" onclick="goToken()">LANJUT</button>
        </div>
    </div>

    <div id="p-token" class="page">
        <div class="card">
            <h2 id="t-name">MATA PELAJARAN</h2>
            <input type="text" id="tk" placeholder="Masukkan Token">
            <div style="display:flex; gap:10px;">
                <button class="btn-action" style="background:#95a5a6; color:white;" onclick="pindah('p-mapel')">BATAL</button>
                <button id="btn-token" class="btn-action" style="background:var(--success); color:white;" onclick="startExam()">KONFIRMASI</button>
            </div>
        </div>
    </div>

    <div id="p-exam" class="page" style="padding:0; padding-top:65px;">
        <iframe id="f-exam" src="" sandbox="allow-forms allow-scripts allow-same-origin allow-modals" style="width:100%; height:100%; border:none;"></iframe>
    </div>

    <div id="l-ovr" class="overlay">
        <h1 id="l-ttl">TERKUNCI</h1>
        <p id="l-msg" style="font-size:1.2rem; margin-bottom:20px;">Deskripsi Pelanggaran</p>
        <input type="text" id="l-inp" placeholder="KODE AKSES">
        <button class="btn-action" id="l-btn" style="background:var(--success); color:white; margin-top:10px;">BUKA AKSES</button>
    </div>

    <script>
        // ⬇️ GANTI URL DI BAWAH INI DENGAN URL DEPLOYMENT BARU BAPAK ⬇️
        const API = "https://script.google.com/macros/s/AKfycbydoi3UbfRBtLSUHJmXGpKoXJNKoyvlw6D-Ef2rVbpnBfAyzd3q-O8VjogFGRFeFzw6yg/exec"; 
        
        let user = {}, curMapel = {}, pCount = 0, isLive = false, isSystemAction = false;
        
        if ('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(()=>{});

        function appAlert(msg) {
            isSystemAction = true;
            alert(msg);
            setTimeout(() => { isSystemAction = false; }, 500);
        }

        function pindah(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function doLogin() {
            const uReq = document.getElementById('u').value.trim();
            const pReq = document.getElementById('p').value.trim();
            if(!uReq || !pReq) return appAlert("⚠️ Harap isi Username dan Password!");

            const btn = document.getElementById('btn-login');
            btn.innerText = "MEMPROSES...";

            try {
                const res = await fetch(`${API}?action=login&user=${encodeURIComponent(uReq)}&pass=${encodeURIComponent(pReq)}`);
                const d = await res.json();
                
                if(d.status === "success") {
                    user = d;
                    document.getElementById('h-info').innerHTML = `${d.nama} | ${d.kelas}`;
                    
                    if(d.isLocked) {
                        isLive = true; 
                        if(d.lockType === "principal") {
                            showLock("principal", "PELANGGARAN BERAT", "Anda tercatat menjebol keluar dari ujian sebelumnya.\nHubungi KEPALA SEKOLAH.");
                        } else {
                            showLock("proctor", "APLIKASI TERKUNCI", "Anda tercatat melakukan pelanggaran.\nMasukkan KODE PROKTOR.");
                        }
                        return; 
                    }

                    await loadMapel();
                    pindah('p-mapel');
                } else {
                    appAlert("❌ " + d.message);
                }
            } catch(err) {
                console.error(err);
                appAlert("❌ Gagal terhubung ke Server. Detail: " + err.message);
            }
            btn.innerText = "MASUK";
        }

        async function loadMapel() {
            const res = await fetch(`${API}?action=getMapel`);
            const list = await res.json();
            const s = document.getElementById('s-mapel');
            s.innerHTML = '<option value="">-- Pilih Mata Pelajaran --</option>';
            list.forEach(m => s.innerHTML += `<option value='${JSON.stringify(m)}'>${m.nama}</option>`);
        }

        function goToken() {
            const val = document.getElementById('s-mapel').value;
            if(!val) return appAlert("⚠️ Pilih Mata Pelajaran terlebih dahulu!");
            curMapel = JSON.parse(val);
            
            if(curMapel.status !== "AKTIF") {
                return appAlert("❌ MAAF MAPEL INI BELUM DIBUKA");
            }

            document.getElementById('t-name').innerText = curMapel.nama;
            document.getElementById('tk').value = ""; 
            pindah('p-token');
        }

        async function startExam() {
            const inputToken = document.getElementById('tk').value.trim();
            if(!inputToken) return appAlert("⚠️ Masukkan Token!");

            if(inputToken.toUpperCase() === curMapel.token.toUpperCase()) {
                const btn = document.getElementById('btn-token');
                btn.innerText = "MEMBUAT PRESENSI...";
                
                await fetch(`${API}?action=presensi&nama=${encodeURIComponent(user.nama)}&kelas=${encodeURIComponent(user.kelas)}&mapel=${encodeURIComponent(curMapel.nama)}`);
                
                document.getElementById('f-exam').src = curMapel.link;
                isLive = true; 
                pindah('p-exam');
                
                if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            } else {
                appAlert("❌ Token Salah!");
            }
        }

        // PELANGGARAN RINGAN -> DIKIRIM KE KOLOM C (type=minor)
        function handleStandardViolation(pesanPeringatan) {
            pCount++;
            if(pCount >= 2) {
                fetch(`${API}?action=updateP&row=${user.row}&type=minor&count=2`);
                showLock("proctor", "APLIKASI TERKUNCI", "Pelanggaran terdeteksi 2x.\nMasukkan KODE PROKTOR.");
            } else {
                fetch(`${API}?action=updateP&row=${user.row}&type=minor&count=${pCount}`);
                document.getElementById('h-p').innerText = "P: " + pCount;
                appAlert(`⚠️ PERINGATAN (1/2): ${pesanPeringatan}`);
            }
        }

        // PELANGGARAN BERAT -> DIKIRIM KE KOLOM G (type=major)
        document.addEventListener("visibilitychange", function() {
            if (document.visibilityState === 'hidden' && isLive && !isSystemAction) {
                fetch(`${API}?action=updateP&row=${user.row}&type=major`); 
                showLock("principal", "PELANGGARAN BERAT", "Meninggalkan aplikasi secara paksa dilarang keras!\nHubungi KEPALA SEKOLAH.");
            }
        });

        window.addEventListener('blur', function() {
            if(isLive && !isSystemAction) {
                handleStandardViolation("Dilarang membuka layar notifikasi atau layar belah!");
            }
        });

        window.history.pushState(null, null, window.location.href);
        window.addEventListener('popstate', function() {
            if(isLive) {
                window.history.pushState(null, null, window.location.href); 
                if(!isSystemAction) {
                    handleStandardViolation("Dilarang menekan tombol navigasi sistem (Back)!");
                }
            }
        });

        function askExit() {
            showLock("exit", "KONFIRMASI KELUAR", "Masukkan PIN KELUAR.");
        }

        function showLock(type, title, msg) {
            isSystemAction = true; 
            const ov = document.getElementById('l-ovr');
            ov.style.display = 'flex';
            if(type === 'principal') ov.classList.add('heavy');
            
            document.getElementById('l-ttl').innerText = title;
            document.getElementById('l-msg').innerText = msg;
            const btn = document.getElementById('l-btn');
            
            btn.onclick = null; 
            btn.onclick = async () => {
                const code = document.getElementById('l-inp').value.trim();
                if(!code) return appAlert("⚠️ Masukkan Kode!");
                
                btn.innerText = "MENGECEK...";
                const res = await fetch(`${API}?action=checkCode&type=${type}&code=${encodeURIComponent(code)}&row=${user.row || ""}`);
                const d = await res.json();
                
                if(d.status === 'valid') {
                    if(type === 'exit') {
                        appAlert("Menutup aplikasi...");
                        // PAKSA KELUAR APLIKASI
                        setTimeout(() => {
                            window.open('', '_self', ''); 
                            window.close(); 
                            // Jika browser menolak window.close(), lempar siswa ke Google
                            window.location.replace("https://www.google.com"); 
                        }, 800);
                    } else {
                        location.reload(); 
                    }
                } else {
                    appAlert("❌ Kode Salah!");
                }
                btn.innerText = "BUKA AKSES";
            };
        }
    </script>
</body>
</html>
